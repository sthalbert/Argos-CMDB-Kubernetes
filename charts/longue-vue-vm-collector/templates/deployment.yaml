apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "longue-vue-vm-collector.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "longue-vue-vm-collector.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "longue-vue-vm-collector.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "longue-vue-vm-collector.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "longue-vue-vm-collector.serviceAccountName" . }}
      # The vm-collector never calls the Kubernetes API — it only talks to
      # the cloud provider and longue-vue over HTTPS. Skip projecting the SA
      # token so a compromised pod cannot pivot via the in-cluster token.
      automountServiceAccountToken: false
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: vm-collector
          image: {{ include "longue-vue-vm-collector.image" . | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.containerSecurityContext | nindent 12 }}
          {{- if .Values.metrics.enabled }}
          ports:
            - name: metrics
              containerPort: {{ .Values.metrics.port }}
              protocol: TCP
          {{- end }}
          env:
            - name: LONGUE_VUE_SERVER_URL
              value: {{ required "serverURL is required" .Values.serverURL | quote }}
            - name: LONGUE_VUE_VM_COLLECTOR_PROVIDER
              value: {{ .Values.account.provider | quote }}
            - name: LONGUE_VUE_VM_COLLECTOR_ACCOUNT_NAME
              value: {{ required "account.name is required" .Values.account.name | quote }}
            - name: LONGUE_VUE_VM_COLLECTOR_REGION
              value: {{ required "account.region is required" .Values.account.region | quote }}
            {{- if .Values.account.providerEndpoint }}
            - name: LONGUE_VUE_VM_COLLECTOR_PROVIDER_ENDPOINT_URL
              value: {{ .Values.account.providerEndpoint | quote }}
            {{- end }}
            - name: LONGUE_VUE_VM_COLLECTOR_INTERVAL
              value: {{ .Values.interval | quote }}
            - name: LONGUE_VUE_VM_COLLECTOR_FETCH_TIMEOUT
              value: {{ .Values.fetchTimeout | quote }}
            - name: LONGUE_VUE_VM_COLLECTOR_RECONCILE
              value: {{ .Values.reconcile | quote }}
            - name: LONGUE_VUE_VM_COLLECTOR_CREDENTIAL_REFRESH
              value: {{ .Values.credentialRefresh | quote }}
            {{- if .Values.metrics.enabled }}
            - name: LONGUE_VUE_VM_COLLECTOR_METRICS_ADDR
              value: "0.0.0.0:{{ .Values.metrics.port }}"
            {{- end }}
            {{- if .Values.argosTLS.caSecret }}
            - name: LONGUE_VUE_CA_CERT
              value: /etc/longue-vue-vm-collector/tls-ca/{{ .Values.argosTLS.caKey }}
            {{- end }}
            {{- if .Values.argosTLS.existingSecret }}
            - name: LONGUE_VUE_CLIENT_CERT
              value: /etc/longue-vue-vm-collector/tls/tls.crt
            - name: LONGUE_VUE_CLIENT_KEY
              value: /etc/longue-vue-vm-collector/tls/tls.key
            {{- end }}
            {{- if .Values.argosTLS.extraHeaders }}
            - name: LONGUE_VUE_EXTRA_HEADERS
              value: {{ .Values.argosTLS.extraHeaders | quote }}
            {{- end }}
            {{- if .Values.proxy.httpsProxy }}
            - name: HTTPS_PROXY
              value: {{ .Values.proxy.httpsProxy | quote }}
            {{- end }}
            {{- if .Values.proxy.httpProxy }}
            - name: HTTP_PROXY
              value: {{ .Values.proxy.httpProxy | quote }}
            {{- end }}
            {{- if .Values.proxy.noProxy }}
            - name: NO_PROXY
              value: {{ .Values.proxy.noProxy | quote }}
            {{- end }}
            {{- with .Values.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          envFrom:
            - secretRef:
                name: {{ required "tokenSecret.existingSecret is required" .Values.tokenSecret.existingSecret | quote }}
          volumeMounts:
            {{- if .Values.argosTLS.existingSecret }}
            - name: lv-tls
              mountPath: /etc/longue-vue-vm-collector/tls
              readOnly: true
            {{- end }}
            {{- if .Values.argosTLS.caSecret }}
            - name: lv-ca
              mountPath: /etc/longue-vue-vm-collector/tls-ca
              readOnly: true
            {{- end }}
            {{- with .Values.extraVolumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      volumes:
        {{- if .Values.argosTLS.existingSecret }}
        - name: lv-tls
          secret:
            secretName: {{ .Values.argosTLS.existingSecret | quote }}
        {{- end }}
        {{- if .Values.argosTLS.caSecret }}
        - name: lv-ca
          {{- if hasPrefix "configmap:" .Values.argosTLS.caSecret }}
          configMap:
            name: {{ trimPrefix "configmap:" .Values.argosTLS.caSecret | quote }}
            items:
              - key: {{ .Values.argosTLS.caKey }}
                path: {{ .Values.argosTLS.caKey }}
          {{- else }}
          secret:
            secretName: {{ .Values.argosTLS.caSecret | quote }}
            items:
              - key: {{ .Values.argosTLS.caKey }}
                path: {{ .Values.argosTLS.caKey }}
          {{- end }}
        {{- end }}
        {{- with .Values.extraVolumes }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
