{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "longue-vue-vm-collector.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "longue-vue-vm-collector.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "longue-vue-vm-collector.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    {{- if .Values.metrics.enabled }}
    # Allow Prometheus (or anything in the cluster) to scrape /metrics.
    # Operators wanting tighter ingress should set networkPolicy.enabled
    # = false and write a bespoke policy.
    - ports:
        - protocol: TCP
          port: {{ .Values.metrics.port }}
    {{- end }}
  egress:
    # DNS — required to resolve longue-vue / DMZ-gateway / cloud-API hosts.
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    {{- if .Values.networkPolicy.egressCIDRs }}
    # When the operator supplies egressCIDRs, scope 443 to that list.
    # Must include longue-vue / the DMZ gateway AND the cloud-provider API.
    - to:
        {{- range .Values.networkPolicy.egressCIDRs }}
        - ipBlock:
            cidr: {{ . | quote }}
        {{- end }}
      ports:
        - protocol: TCP
          port: 443
    {{- else }}
    # No egressCIDRs supplied — fall back to allowing 443 to any IP so
    # the collector can reach both longue-vue and the cloud-provider API.
    - ports:
        - protocol: TCP
          port: 443
    {{- end }}
{{- end }}
