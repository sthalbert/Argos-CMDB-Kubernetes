{{- if .Values.rbac.create }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "argos-collector.clusterRoleName" . }}
  labels:
    {{- include "argos-collector.labels" . | nindent 4 }}
rules:
  # Read-only inventory of cluster-scoped and namespaced API objects the
  # collector mirrors into the CMDB. `list` is sufficient — the collector
  # never reads, watches, or mutates individual objects.
  - apiGroups: [""]
    resources:
      - nodes
      - namespaces
      - pods
      - services
      - persistentvolumes
      - persistentvolumeclaims
    verbs: ["list"]
  - apiGroups: ["apps"]
    resources:
      - deployments
      - statefulsets
      - daemonsets
      - replicasets
    verbs: ["list"]
  - apiGroups: ["networking.k8s.io"]
    resources:
      - ingresses
    verbs: ["list"]
{{- end }}
