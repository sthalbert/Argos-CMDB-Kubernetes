apiVersion: v1
kind: Service
metadata:
  name: {{ include "argos.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "argos.labels" . | nindent 4 }}
    app.kubernetes.io/component: daemon
spec:
  type: {{ .Values.service.type }}
  selector:
    {{- include "argos.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: daemon
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
    {{- if and .Values.mcp.enabled (eq .Values.mcp.transport "sse") }}
    - name: mcp
      port: {{ .Values.service.mcpPort }}
      targetPort: mcp
      protocol: TCP
    {{- end }}
