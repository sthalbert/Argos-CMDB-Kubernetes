apiVersion: v2
name: argos-vm-collector
description: >-
  Push-mode cloud-VM collector for the Argos CMDB (ADR-0015). Polls a single
  cloud-provider account (e.g. Outscale) and pushes VM observations to a
  central argosd. Stateless; one Helm release per cloud account. Ships
  independently of the umbrella `argos` chart so cloud-account collector
  releases stay decoupled from the central control-plane release.
type: application
version: 0.1.0
appVersion: "0.11.1"
home: https://github.com/sthalbert/Argos
sources:
  - https://github.com/sthalbert/Argos
maintainers:
  - name: Steve Albert
    url: https://github.com/sthalbert
keywords:
  - argos
  - cmdb
  - virtual-machines
  - outscale
  - cloud
  - push
  - secnumcloud
  - anssi
