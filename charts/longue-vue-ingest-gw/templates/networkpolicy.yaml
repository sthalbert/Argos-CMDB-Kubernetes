{{- if .Values.networkPolicy.enabled -}}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "longue-vue-ingest-gw.fullname" . }}
  labels:
    {{- include "longue-vue-ingest-gw.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "longue-vue-ingest-gw.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Inbound from anywhere — Envoy / WAF in front terminates external
    # traffic and the gateway listens on TLS. Operators who run Envoy
    # in the same cluster can tighten this further by selecting on
    # Envoy's namespace + pod labels.
    - ports:
        - port: ingest
          protocol: TCP
    # Health/metrics: only Prometheus / kubelet probes need this. Without
    # a label selector we accept anything in-cluster on this port; the
    # endpoint itself returns no sensitive data.
    - ports:
        - port: health
          protocol: TCP
  egress:
    # DNS — required for any clustered service lookup. Bound to kube-dns
    # / coredns in the kube-system namespace via the standard label.
    - to:
        - namespaceSelector: {}
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53

    # longue-vue's mTLS-only ingest listener — the only application-layer
    # destination the gateway is allowed to reach. Pin the namespace
    # selector by name + the pod selector by app.kubernetes.io/name so
    # this stays valid across longue-vue chart releases.
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.networkPolicy.argosdNamespace | quote }}
          podSelector:
            {{- toYaml .Values.networkPolicy.argosdSelector | nindent 12 }}
      ports:
        - protocol: TCP
          port: {{ .Values.networkPolicy.argosdIngestPort }}

    {{- if and (eq .Values.mtls.mode "vault") .Values.networkPolicy.vaultEgress.enabled }}
    # Vault server — only allowed when mTLS mode is "vault" and the
    # operator explicitly opted in by listing the Vault server CIDRs.
    - to:
        {{- range .Values.networkPolicy.vaultEgress.cidrs }}
        - ipBlock:
            cidr: {{ . | quote }}
        {{- end }}
      ports:
        - protocol: TCP
          port: {{ .Values.networkPolicy.vaultEgress.port }}
    {{- end }}
{{- end }}
