{{- if .Values.serviceAccount.create -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "longue-vue-ingest-gw.serviceAccountName" . }}
  labels:
    {{- include "longue-vue-ingest-gw.labels" . | nindent 4 }}
# Vault k8s auth needs to project this SA's JWT into the pod for login.
# In secret/file modes the SA exists for completeness but is unused — the
# automountServiceAccountToken on the deployment ensures the token isn't
# actually mounted unless mtls.mode == "vault".
{{- end }}
