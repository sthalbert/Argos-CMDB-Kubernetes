{{- if not .Values.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "longue-vue.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "longue-vue.labels" . | nindent 4 }}
type: Opaque
stringData:
  LONGUE_VUE_DATABASE_URL: {{ include "longue-vue.databaseUrl" . | quote }}
  {{- if .Values.postgresql.enabled }}
  POSTGRES_PASSWORD: {{ .Values.postgresql.auth.password | quote }}
  {{- end }}
  {{- if .Values.argosd.bootstrapAdminPassword }}
  LONGUE_VUE_BOOTSTRAP_ADMIN_PASSWORD: {{ .Values.argosd.bootstrapAdminPassword | quote }}
  {{- end }}
  {{- if .Values.oidc.enabled }}
  LONGUE_VUE_OIDC_ISSUER: {{ .Values.oidc.issuer | quote }}
  LONGUE_VUE_OIDC_CLIENT_ID: {{ .Values.oidc.clientId | quote }}
  LONGUE_VUE_OIDC_CLIENT_SECRET: {{ .Values.oidc.clientSecret | quote }}
  LONGUE_VUE_OIDC_REDIRECT_URL: {{ .Values.oidc.redirectUrl | quote }}
  {{- if .Values.oidc.scopes }}
  LONGUE_VUE_OIDC_SCOPES: {{ .Values.oidc.scopes | quote }}
  {{- end }}
  {{- if .Values.oidc.label }}
  LONGUE_VUE_OIDC_LABEL: {{ .Values.oidc.label | quote }}
  {{- end }}
  {{- end }}
  {{- if and (.Values.secrets) (.Values.secrets.masterKey) (not .Values.secrets.existingSecret) }}
  LONGUE_VUE_SECRETS_MASTER_KEY: {{ .Values.secrets.masterKey | quote }}
  {{- end }}
{{- end }}
