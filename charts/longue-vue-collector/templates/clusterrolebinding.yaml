{{- if .Values.rbac.create }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "longue-vue-collector.clusterRoleName" . }}
  labels:
    {{- include "longue-vue-collector.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "longue-vue-collector.clusterRoleName" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "longue-vue-collector.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
{{- end }}
