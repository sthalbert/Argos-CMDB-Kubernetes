apiVersion: v2
name: argos-ingest-gw
description: >-
  DMZ ingest gateway for the Argos CMDB (ADR-0016). Stateless reverse-proxy
  deployed in a perimeter network in front of argosd. Accepts inbound HTTPS
  from K8s push collectors, verifies bearer tokens against argosd via mTLS,
  and forwards a strict-write-only allowlist of write requests into the
  trusted zone. Ships independently of the umbrella `argos` chart so the
  DMZ release contains only what should be in the DMZ.
type: application
version: 0.1.1
appVersion: "0.11.1"
home: https://github.com/sthalbert/Argos
sources:
  - https://github.com/sthalbert/Argos
maintainers:
  - name: Steve Albert
    url: https://github.com/sthalbert
keywords:
  - argos
  - cmdb
  - dmz
  - gateway
  - mtls
  - secnumcloud
  - anssi
