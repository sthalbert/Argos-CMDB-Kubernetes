  /v1/auth/config:
    get:
      tags: [auth]
      summary: Public auth configuration the UI needs pre-login
      description: |
        Returns knobs the login page needs to render — today just
        whether OIDC is configured and, if so, the button label.
        Intentionally public; nothing returned here is sensitive.
      operationId: getAuthConfig
      security: []
      responses:
        '200':
          description: Auth configuration.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthConfig'

  /v1/auth/oidc/authorize:
    get:
      tags: [auth]
      summary: Start the OIDC authorization-code flow
      description: |
        Mints a fresh state, PKCE code_verifier/challenge pair, and
        nonce; persists the verifier + nonce in `oidc_auth_states`;
        302s to the configured IdP's authorize endpoint. Returns 404
        when OIDC is not configured.
      operationId: oidcAuthorize
      security: []
      responses:
        '302':
          description: Redirect to the IdP.
          headers:
            Location:
              schema:
                type: string
                format: uri
        '404':
          description: OIDC is not configured on this argosd.

  /v1/auth/oidc/callback:
    get:
      tags: [auth]
      summary: Complete the OIDC authorization-code flow
      description: |
        Consumes the state / PKCE verifier / nonce stashed at authorize
        time, exchanges the code with the IdP, verifies the ID token
        (issuer, audience, signature, nonce), finds or creates the
        shadow user keyed on `(issuer, sub)`, mints a session, 302s to
        `/ui/`. Failures land on `/ui/login?oidc_error=<reason>`.
      operationId: oidcCallback
      security: []
      parameters:
        - name: code
          in: query
          required: true
          schema:
            type: string
        - name: state
          in: query
          required: true
          schema:
            type: string
      responses:
        '302':
          description: Redirect to the UI.
          headers:
            Location:
              schema:
                type: string

  /v1/auth/login:
    post:
      tags: [auth]
      summary: Start a human session
      description: |
        Exchanges a username + password for a session cookie. Returns 401
        with an opaque problem body on any failure (no distinction between
        unknown user and bad password). Sets `argos_session` as HttpOnly +
        SameSite=Strict; the browser carries it on subsequent same-origin
        requests automatically.
      operationId: login
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '204':
          description: Session created.
          headers:
            Set-Cookie:
              description: Session cookie.
              schema:
                type: string
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          description: Too many login attempts. Try again later.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'

  /v1/auth/logout:
    post:
      tags: [auth]
      summary: End the current human session
      description: |
        Deletes the server-side session row and clears the cookie.
        Succeeds silently for callers authenticating via bearer token
        (nothing to revoke) so logout is idempotent.
      operationId: logout
      security:
        - BearerAuth: []
        - SessionCookie: []
      responses:
        '204':
          description: Session cleared.

  /v1/auth/me:
    get:
      tags: [auth]
      summary: Who am I, and what can I do
      description: |
        Returns the caller's identity, role, effective scopes, and the
        `must_change_password` flag. The UI reads this to render
        role-aware navigation and redirect to the forced-change page.
      operationId: getMe
      security:
        - BearerAuth: []
        - SessionCookie: []
      responses:
        '200':
          description: Caller identity.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Me'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /v1/auth/change-password:
    post:
      tags: [auth]
      summary: Change the current user's password
      description: |
        Verifies the current password, hashes the new one (argon2id),
        clears `must_change_password`, and invalidates every other
        active session for the same user. Bearer-token callers get 403 —
        tokens cannot change a user's password.
      operationId: changePassword
      security:
        - SessionCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChangePasswordRequest'
      responses:
        '204':
          description: Password changed.
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /v1/admin/users:
    get:
      tags: [admin]
      summary: List human users
      operationId: listUsers
      security:
        - BearerAuth: [admin]
        - SessionCookie: [admin]
      parameters:
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Cursor'
      responses:
        '200':
          description: Paged list of users.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserList'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
    post:
      tags: [admin]
      summary: Create a human user
      operationId: createUser
      security:
        - BearerAuth: [admin]
        - SessionCookie: [admin]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserCreate'
      responses:
        '201':
          description: User created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          $ref: '#/components/responses/Conflict'

  /v1/admin/users/{id}:
    parameters:
      - $ref: '#/components/parameters/UserId'
    get:
      tags: [admin]
      summary: Get a user
      operationId: getUser
      security:
        - BearerAuth: [admin]
        - SessionCookie: [admin]
      responses:
        '200':
          description: User.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      tags: [admin]
      summary: Update a user's role, password, or disabled state
      description: |
        Merge-patch semantics. Setting `password` rehashes and forces
        `must_change_password=true`. Setting `disabled` to true revokes
        every active session for that user.
      operationId: updateUser
      security:
        - BearerAuth: [admin]
        - SessionCookie: [admin]
      requestBody:
        required: true
        content:
          application/merge-patch+json:
            schema:
              $ref: '#/components/schemas/UserUpdate'
      responses:
        '200':
          description: Updated user.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      tags: [admin]
      summary: Delete a user
      description: |
        Cascades to the user's sessions and OIDC identities. API tokens
        the user minted are retained (ON DELETE RESTRICT) — revoke them
        explicitly first, or leave them active for the next admin.
      operationId: deleteUser
      security:
        - BearerAuth: [admin]
        - SessionCookie: [admin]
      responses:
        '204':
          description: Deleted.
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'

  /v1/admin/tokens:
    get:
      tags: [admin]
      summary: List machine tokens (metadata only — plaintext never leaves creation)
      operationId: listApiTokens
      security:
        - BearerAuth: [admin]
        - SessionCookie: [admin]
      parameters:
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Cursor'
      responses:
        '200':
          description: Paged list of tokens.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiTokenList'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
    post:
      tags: [admin]
      summary: Mint a new machine token
      description: |
        Returns the full plaintext token exactly once in the response.
        argosd persists only its argon2id hash — this value cannot be
        retrieved later. If lost, revoke and mint a new one.
      operationId: createApiToken
      security:
        - BearerAuth: [admin]
        - SessionCookie: [admin]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ApiTokenCreate'
      responses:
        '201':
          description: Token minted; plaintext shown once in the body.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiTokenMint'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /v1/admin/tokens/{id}:
    parameters:
      - $ref: '#/components/parameters/TokenId'
    delete:
      tags: [admin]
      summary: Revoke a machine token
      description: |
        Sets `revoked_at`; subsequent requests bearing the token receive
        401 immediately. Token rows are kept for audit continuity — use
        the list endpoint to review past revocations.
      operationId: revokeApiToken
      security:
        - BearerAuth: [admin]
        - SessionCookie: [admin]
      responses:
        '204':
          description: Revoked.
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /v1/admin/sessions:
    get:
      tags: [admin]
      summary: List active human sessions
      operationId: listSessions
      security:
        - BearerAuth: [admin]
        - SessionCookie: [admin]
      parameters:
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Cursor'
      responses:
        '200':
          description: Paged list of sessions.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionList'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /v1/admin/audit:
    get:
      tags: [admin]
      summary: List audit events
      description: |
        Paged, newest-first list of recorded API actions. Requires the
        `audit` scope, granted to both `admin` and `auditor` roles —
        auditors get read-only visibility without the ability to manage
        users or tokens.

        Filters are AND-combined. `since` / `until` bound the
        `occurred_at` range (half-open: `[since, until)`).
      operationId: listAuditEvents
      security:
        - BearerAuth: [audit]
        - SessionCookie: [audit]
      parameters:
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Cursor'
        - name: actor_id
          in: query
          schema:
            type: string
            format: uuid
          description: Filter to events emitted by this user.
        - name: resource_type
          in: query
          schema:
            type: string
          description: Filter to events affecting a specific resource kind (e.g. `cluster`, `user`).
        - name: resource_id
          in: query
          schema:
            type: string
          description: Filter to events affecting a specific resource id.
        - name: action
          in: query
          schema:
            type: string
          description: Filter to a specific action verb (e.g. `user.create`).
        - name: since
          in: query
          schema:
            type: string
            format: date-time
        - name: until
          in: query
          schema:
            type: string
            format: date-time
      responses:
        '200':
          description: Paged list of audit events.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuditEventList'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /v1/admin/sessions/{id}:
    parameters:
      - $ref: '#/components/parameters/SessionId'
    delete:
      tags: [admin]
      summary: Revoke an active session
      description: |
        Deletes the row; the next request bearing that cookie gets 401
        and the UI redirects to login.
      operationId: revokeSession
      security:
        - BearerAuth: [admin]
        - SessionCookie: [admin]
      responses:
        '204':
          description: Revoked.
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

components:

  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: token
      description: |
        API token issued out-of-band. Send as `Authorization: Bearer <token>`.

        Scopes granted to a token:
          - `read`   — list and get operations
          - `write`  — create and update (implies `read` at the caller's discretion)
          - `delete` — remove resources
          - `admin`  — all of the above; reserved for future admin-only endpoints

        Tokens carrying the `admin` scope implicitly satisfy any scope required
        by an operation.

        Per ADR-0007, machine tokens are created by an admin in the UI
        (see `POST /v1/admin/tokens`) rather than injected through env vars.

    SessionCookie:
      type: apiKey
      in: cookie
      name: argos_session
      description: |
        Human session cookie set by `POST /v1/auth/login`. HttpOnly,
        SameSite=Strict, 8-hour sliding expiry. Per ADR-0007.

        Every operation accepts either `BearerAuth` or `SessionCookie` —
        scope enforcement reads from the caller's role (for sessions) or
        token scopes (for bearer), so the two paths share the same
        downstream authorisation check.

  parameters:

    ClusterId:
      name: id
      in: path
      required: true
      description: Server-assigned cluster identifier.
      schema:
        type: string
        format: uuid

    NodeId:
      name: id
      in: path
      required: true
      description: Server-assigned node identifier.
      schema:
        type: string
        format: uuid

    NodeClusterIdFilter:
      name: cluster_id
      in: query
      required: false
      description: Return only nodes belonging to this cluster.
      schema:
        type: string
        format: uuid

    NamespaceId:
      name: id
      in: path
      required: true
      description: Server-assigned namespace identifier.
      schema:
        type: string
        format: uuid

    NamespaceClusterIdFilter:
      name: cluster_id
      in: query
      required: false
      description: Return only namespaces belonging to this cluster.
      schema:
        type: string
        format: uuid

    PodId:
      name: id
      in: path
      required: true
      description: Server-assigned pod identifier.
      schema:
        type: string
        format: uuid

    PodNamespaceIdFilter:
      name: namespace_id
      in: query
      required: false
      description: Return only pods belonging to this namespace.
      schema:
        type: string
        format: uuid

    PodImageFilter:
      name: image
      in: query
      required: false
      description: |
        Case-insensitive substring match against any container's `image`
        field in the pod's containers JSON (init containers included).
        Handy for answering "which pods run `log4j:2.15.0`?" — a partial
        like `log4j:2.15` will match `log4j:2.15.0`, `log4j:2.15.1`, etc.
      schema:
        type: string
        maxLength: 253

    PodNodeNameFilter:
      name: node_name
      in: query
      required: false
      description: |
        Exact match against the pod's `node_name`. Lets the Node detail
        view answer "which pods are hosted on this node?" without
        paginating every pod in the cluster.
      schema:
        type: string
        maxLength: 253

    PodWorkloadIdFilter:
      name: workload_id
      in: query
      required: false
      description: |
        Filter pods by their controlling workload. Returns only pods whose
        `workload_id` FK matches the given UUID.
      schema:
        type: string
        format: uuid

    WorkloadId:
      name: id
      in: path
      required: true
      description: Server-assigned workload identifier.
      schema:
        type: string
        format: uuid

    WorkloadNamespaceIdFilter:
      name: namespace_id
      in: query
      required: false
      description: Return only workloads belonging to this namespace.
      schema:
        type: string
        format: uuid

    WorkloadKindFilter:
      name: kind
      in: query
      required: false
      description: Return only workloads of this kind.
      schema:
        $ref: '#/components/schemas/WorkloadKind'

    WorkloadImageFilter:
      name: image
      in: query
      required: false
      description: |
        Case-insensitive substring match against any container's `image`
        field in the workload's containers JSON (init containers included).
        Mirrors the PodImageFilter so both kinds answer the same
        "which assets run this component version?" question.
      schema:
        type: string
        maxLength: 253

    ServiceId:
      name: id
      in: path
      required: true
      description: Server-assigned service identifier.
      schema:
        type: string
        format: uuid

    ServiceNamespaceIdFilter:
      name: namespace_id
      in: query
      required: false
      description: Return only services belonging to this namespace.
      schema:
        type: string
        format: uuid

    IngressId:
      name: id
      in: path
      required: true
      description: Server-assigned ingress identifier.
      schema:
        type: string
        format: uuid

    IngressNamespaceIdFilter:
      name: namespace_id
      in: query
      required: false
      description: Return only ingresses belonging to this namespace.
      schema:
        type: string
        format: uuid

    PersistentVolumeId:
      name: id
      in: path
      required: true
      description: Server-assigned persistent volume identifier.
      schema:
        type: string
        format: uuid

    PersistentVolumeClusterIdFilter:
      name: cluster_id
      in: query
      required: false
      description: Return only persistent volumes belonging to this cluster.
      schema:
        type: string
        format: uuid

    PersistentVolumeClaimId:
      name: id
      in: path
      required: true
      description: Server-assigned persistent volume claim identifier.
      schema:
        type: string
        format: uuid

    PersistentVolumeClaimNamespaceIdFilter:
      name: namespace_id
      in: query
      required: false
      description: Return only persistent volume claims belonging to this namespace.
      schema:
        type: string
        format: uuid

    UserId:
      name: id
      in: path
      required: true
      description: Server-assigned user identifier.
      schema:
        type: string
        format: uuid

    TokenId:
      name: id
      in: path
      required: true
      description: Server-assigned API token identifier.
      schema:
        type: string
        format: uuid

    SessionId:
      name: id
      in: path
      required: true
      description: Session identifier (the cookie value).
      schema:
        type: string
        maxLength: 64

    Limit:
      name: limit
      in: query
      required: false
      description: Maximum number of items to return. Server clamps to [1, 200].
      schema:
        type: integer
        minimum: 1
        maximum: 200
        default: 50

    Cursor:
      name: cursor
      in: query
      required: false
      description: Opaque cursor returned from a previous list response.
      schema:
        type: string
        maxLength: 512

  responses:

    BadRequest:
      description: Malformed request.
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'

    Unauthorized:
      description: Missing or invalid bearer token.
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'

    Forbidden:
      description: Token is valid but lacks the scope required by the operation.
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'

    NotFound:
      description: Resource not found.
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'

    Conflict:
      description: Conflict with current state (e.g., duplicate name).
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'

  schemas:

    Health:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [ok]
        version:
          type: string
          description: Build version of the running argosd.

    Layer:
      type: string
      description: |
        ANSSI cartography layer the asset belongs to. See ADR-0002 for the
        kind-to-layer mapping and the rationale behind the six-layer model.
      enum:
        - ecosystem
        - business
        - applicative
        - administration
        - infrastructure_logical
        - infrastructure_physical

    # ── Reconcile schemas (ADR-0009: push collector) ──────────────────

    ReconcileClusterScoped:
      type: object
      required: [cluster_id, keep_names]
      properties:
        cluster_id:
          type: string
          format: uuid
        keep_names:
          type: array
          items:
            type: string

    ReconcileNamespaceScoped:
      type: object
      required: [namespace_id, keep_names]
      properties:
        namespace_id:
          type: string
          format: uuid
        keep_names:
          type: array
          items:
            type: string

    ReconcileWorkloads:
      type: object
      required: [namespace_id, keep_kinds, keep_names]
      properties:
        namespace_id:
          type: string
          format: uuid
        keep_kinds:
          type: array
          items:
            type: string
        keep_names:
          type: array
          items:
            type: string

    ReconcileResult:
      type: object
      required: [deleted]
      properties:
        deleted:
          type: integer
          format: int64

    Problem:
      description: RFC 7807 problem details.
      type: object
      required: [type, title, status]
      properties:
        type:
          type: string
          format: uri
          default: about:blank
        title:
          type: string
        status:
          type: integer
          minimum: 100
          maximum: 599
        detail:
          type: string
        instance:
          type: string
          format: uri
        errors:
          type: array
          description: Field-level validation errors, when applicable.
          items:
            type: object
            required: [field, message]
            properties:
              field:
                type: string
              message:
                type: string

    ClusterMutable:
      description: Fields on a Cluster that clients may set and later update.
      type: object
      properties:
        display_name:
          type: string
          maxLength: 256
          description: Human-friendly label, free-form.
        environment:
          type: string
          maxLength: 64
          description: Free-form environment tag (e.g., dev, staging, prod).
        provider:
          type: string
          maxLength: 64
          description: |
            Underlying Kubernetes distribution or hosting provider.
            Open-ended; common values: gke, eks, aks, openshift, rke, kubeadm, onprem, other.
        region:
          type: string
          maxLength: 64
        kubernetes_version:
          type: string
          maxLength: 32
          description: Cluster API server version reported by Kubernetes (e.g. "1.29.5").
        api_endpoint:
          type: string
          format: uri
          description: Kubernetes API server URL (informational).
        labels:
          type: object
          description: Arbitrary user-supplied string key/value labels.
          additionalProperties:
            type: string
            maxLength: 256
          maxProperties: 64
        owner:
          type: string
          maxLength: 256
          description: |
            Free-form handle for the team / on-call that owns this
            cluster. Surfaced on the detail page so incident responders
            know who to wake up.
        criticality:
          type: string
          maxLength: 32
          description: |
            Free-form tier label. Common values: `critical`, `high`,
            `medium`, `low`. Not enum-enforced so operators can slot in
            their own taxonomy (P0/P1/…).
        notes:
          type: string
          maxLength: 8192
          description: Long-form prose. Any markdown is rendered client-side.
        runbook_url:
          type: string
          format: uri
          maxLength: 1024
          description: Link to the owning team's runbook for this cluster.
        annotations:
          type: object
          description: |
            Free-form k/v for metadata not worth its own column. Values
            are strings. Collector writes never touch this field.
          additionalProperties:
            type: string
            maxLength: 1024
          maxProperties: 64

    ClusterCreate:
      description: Payload to register a new cluster.
      allOf:
        - $ref: '#/components/schemas/ClusterMutable'
        - type: object
          required: [name]
          properties:
            name:
              type: string
              description: |
                Stable slug-like identifier, unique across the CMDB.
                Immutable after creation.
              pattern: '^[a-z0-9][a-z0-9-]{0,62}[a-z0-9]$'
              minLength: 2
              maxLength: 64

    ClusterUpdate:
      description: |
        Merge-patch body. Only mutable fields; `name` is immutable.
        Omitted fields are left unchanged.
      allOf:
        - $ref: '#/components/schemas/ClusterMutable'

    Cluster:
      description: A Kubernetes cluster registered in the CMDB.
      allOf:
        - $ref: '#/components/schemas/ClusterMutable'
        - type: object
          required: [id, name, layer, created_at, updated_at]
          properties:
            id:
              type: string
              format: uuid
              readOnly: true
            name:
              type: string
              pattern: '^[a-z0-9][a-z0-9-]{0,62}[a-z0-9]$'
              minLength: 2
              maxLength: 64
            layer:
              allOf:
                - $ref: '#/components/schemas/Layer'
              readOnly: true
              description: Always `infrastructure_logical` for Cluster. Set by the server.
            created_at:
              type: string
              format: date-time
              readOnly: true
            updated_at:
              type: string
              format: date-time
              readOnly: true

    ClusterList:
      description: Paged list of clusters.
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Cluster'
        next_cursor:
          type: string
          nullable: true
          description: |
            Opaque cursor to pass as `?cursor=` to fetch the next page.
            Absent or null when no more pages remain.

    NodeMutable:
      description: |
        Fields on a Node that clients may set and later update. Modelled on
        Mercator's logical-server entity, with Kubernetes-specific
        additions (role, taints, conditions, the full OS stack). Curated
        operator-owned fields (`owner`, `criticality`, `notes`,
        `runbook_url`, `annotations`, `hardware_model`) are populated by
        editors / admins through the detail page; the collector never
        writes them.
      type: object
      properties:
        display_name:
          type: string
          maxLength: 256
          description: Human-friendly label, free-form.
        role:
          type: string
          maxLength: 32
          description: |
            Node role derived from `node-role.kubernetes.io/*` labels.
            Common values: `control-plane`, `worker`, `etcd`.
        kubelet_version:
          type: string
          maxLength: 32
          description: Kubelet git version as reported by Kubernetes (e.g. "v1.29.5").
        kube_proxy_version:
          type: string
          maxLength: 32
        container_runtime_version:
          type: string
          maxLength: 64
          description: e.g. `containerd://1.7.13`.
        os_image:
          type: string
          maxLength: 256
          description: Node OS image string (e.g. "Ubuntu 22.04.3 LTS").
        operating_system:
          type: string
          maxLength: 32
          description: OS family as reported by Kubernetes (`linux`, `windows`).
        kernel_version:
          type: string
          maxLength: 128
        architecture:
          type: string
          maxLength: 32
          description: |
            CPU architecture. Open-ended; common values: amd64, arm64, ppc64le, s390x.
        internal_ip:
          type: string
          maxLength: 45
          description: Primary InternalIP address from status.addresses.
        external_ip:
          type: string
          maxLength: 45
          description: First ExternalIP from status.addresses, if any.
        pod_cidr:
          type: string
          maxLength: 64
        provider_id:
          type: string
          maxLength: 256
          description: |
            Cloud provider identifier from spec.providerID
            (e.g. `aws:///eu-west-1a/i-0abc1234567890def`).
        instance_type:
          type: string
          maxLength: 128
          description: |
            Value of the `node.kubernetes.io/instance-type` label
            (e.g. `m6i.xlarge`, `Standard_D4s_v5`).
        zone:
          type: string
          maxLength: 64
          description: |
            Value of the `topology.kubernetes.io/zone` label
            (e.g. `eu-west-1a`).
        capacity_cpu:
          type: string
          maxLength: 32
          description: Total CPU the node reports via status.capacity.cpu (quantity).
        capacity_memory:
          type: string
          maxLength: 32
        capacity_pods:
          type: string
          maxLength: 32
        capacity_ephemeral_storage:
          type: string
          maxLength: 32
        allocatable_cpu:
          type: string
          maxLength: 32
          description: CPU schedulable by Kubernetes after system reservations.
        allocatable_memory:
          type: string
          maxLength: 32
        allocatable_pods:
          type: string
          maxLength: 32
        allocatable_ephemeral_storage:
          type: string
          maxLength: 32
        conditions:
          type: array
          description: |
            Status conditions from the Node (Ready, MemoryPressure,
            DiskPressure, PIDPressure, NetworkUnavailable). Each entry
            preserves the Kubernetes shape so readers can filter by
            `type`/`status` without reparse.
          items:
            type: object
            additionalProperties: true
          maxItems: 32
        taints:
          type: array
          description: |
            Scheduling taints from spec.taints. Each entry has
            `{key, value, effect}` — a pod lands here only if it
            tolerates every taint whose effect is NoSchedule/NoExecute.
          items:
            type: object
            additionalProperties: true
          maxItems: 64
        unschedulable:
          type: boolean
          description: spec.unschedulable — the kubectl `cordon` flag.
        ready:
          type: boolean
          description: |
            Convenience boolean derived from the `Ready` status condition.
            The full condition (with reason/lastTransitionTime) is in the
            `conditions` array.
        labels:
          type: object
          description: Arbitrary user-supplied string key/value labels.
          additionalProperties:
            type: string
            maxLength: 256
          maxProperties: 64
        owner:
          type: string
          maxLength: 256
          description: |
            Free-form handle for the team / on-call that owns this
            node. Surfaced on the detail page so incident responders
            know who to wake up.
        criticality:
          type: string
          maxLength: 32
          description: |
            Free-form operational tier label (`critical`, `high`,
            `medium`, `low`).
        notes:
          type: string
          maxLength: 8192
          description: Long-form prose.
        runbook_url:
          type: string
          format: uri
          maxLength: 1024
          description: Link to the owning team's runbook for this node.
        annotations:
          type: object
          description: |
            Free-form k/v for metadata not worth its own column. The
            collector never writes this field.
          additionalProperties:
            type: string
            maxLength: 1024
          maxProperties: 64
        hardware_model:
          type: string
          maxLength: 256
          description: |
            Free-form bare-metal server model (e.g. "Dell PowerEdge
            R640"). Complements the cloud-shaped `instance_type` set
            by the collector; operator-owned.

    NodeCreate:
      description: Payload to register a new node under a cluster.
      allOf:
        - $ref: '#/components/schemas/NodeMutable'
        - type: object
          required: [cluster_id, name]
          properties:
            cluster_id:
              type: string
              format: uuid
              description: |
                Parent cluster id. Immutable after creation; the cluster must
                already exist or the create returns 404.
            name:
              type: string
              description: |
                Kubernetes node name (DNS-subdomain style). Unique per cluster.
                Immutable after creation.
              pattern: '^[a-z0-9]([-a-z0-9.]*[a-z0-9])?$'
              minLength: 2
              maxLength: 253

    NodeUpdate:
      description: |
        Merge-patch body. Only mutable fields; `cluster_id` and `name` are
        immutable. Omitted fields are left unchanged.
      allOf:
        - $ref: '#/components/schemas/NodeMutable'

    Node:
      description: A Kubernetes node registered in the CMDB.
      allOf:
        - $ref: '#/components/schemas/NodeMutable'
        - type: object
          required: [id, cluster_id, name, layer, created_at, updated_at]
          properties:
            id:
              type: string
              format: uuid
              readOnly: true
            cluster_id:
