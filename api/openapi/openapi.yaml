components:

  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: token
      description: |
        API token issued out-of-band. Send as `Authorization: Bearer <token>`.

        Scopes granted to a token:
          - `read`   — list and get operations
          - `write`  — create and update (implies `read` at the caller's discretion)
          - `delete` — remove resources
          - `admin`  — all of the above; reserved for future admin-only endpoints

        Tokens carrying the `admin` scope implicitly satisfy any scope required
        by an operation.

  parameters:

    ClusterId:
      name: id
      in: path
      required: true
      description: Server-assigned cluster identifier.
      schema:
        type: string
        format: uuid

    NodeId:
      name: id
      in: path
      required: true
      description: Server-assigned node identifier.
      schema:
        type: string
        format: uuid

    NodeClusterIdFilter:
      name: cluster_id
      in: query
      required: false
      description: Return only nodes belonging to this cluster.
      schema:
        type: string
        format: uuid

    NamespaceId:
      name: id
      in: path
      required: true
      description: Server-assigned namespace identifier.
      schema:
        type: string
        format: uuid

    NamespaceClusterIdFilter:
      name: cluster_id
      in: query
      required: false
      description: Return only namespaces belonging to this cluster.
      schema:
        type: string
        format: uuid

    PodId:
      name: id
      in: path
      required: true
      description: Server-assigned pod identifier.
      schema:
        type: string
        format: uuid

    PodNamespaceIdFilter:
      name: namespace_id
      in: query
      required: false
      description: Return only pods belonging to this namespace.
      schema:
        type: string
        format: uuid

    PodImageFilter:
      name: image
      in: query
      required: false
      description: |
        Case-insensitive substring match against any container's `image`
        field in the pod's containers JSON (init containers included).
        Handy for answering "which pods run `log4j:2.15.0`?" — a partial
        like `log4j:2.15` will match `log4j:2.15.0`, `log4j:2.15.1`, etc.
      schema:
        type: string
        maxLength: 253

    PodNodeNameFilter:
      name: node_name
      in: query
      required: false
      description: |
        Exact match against the pod's `node_name`. Lets the Node detail
        view answer "which pods are hosted on this node?" without
        paginating every pod in the cluster.
      schema:
        type: string
        maxLength: 253

    WorkloadId:
      name: id
      in: path
      required: true
      description: Server-assigned workload identifier.
      schema:
        type: string
        format: uuid

    WorkloadNamespaceIdFilter:
      name: namespace_id
      in: query
      required: false
      description: Return only workloads belonging to this namespace.
      schema:
        type: string
        format: uuid

    WorkloadKindFilter:
      name: kind
      in: query
      required: false
      description: Return only workloads of this kind.
      schema:
        $ref: '#/components/schemas/WorkloadKind'

    WorkloadImageFilter:
      name: image
      in: query
      required: false
      description: |
        Case-insensitive substring match against any container's `image`
        field in the workload's containers JSON (init containers included).
        Mirrors the PodImageFilter so both kinds answer the same
        "which assets run this component version?" question.
      schema:
        type: string
        maxLength: 253

    ServiceId:
      name: id
      in: path
      required: true
      description: Server-assigned service identifier.
      schema:
        type: string
        format: uuid

    ServiceNamespaceIdFilter:
      name: namespace_id
      in: query
      required: false
      description: Return only services belonging to this namespace.
      schema:
        type: string
        format: uuid

    IngressId:
      name: id
      in: path
      required: true
      description: Server-assigned ingress identifier.
      schema:
        type: string
        format: uuid

    IngressNamespaceIdFilter:
      name: namespace_id
      in: query
      required: false
      description: Return only ingresses belonging to this namespace.
      schema:
        type: string
        format: uuid

    PersistentVolumeId:
      name: id
      in: path
      required: true
      description: Server-assigned persistent volume identifier.
      schema:
        type: string
        format: uuid

    PersistentVolumeClusterIdFilter:
      name: cluster_id
      in: query
      required: false
      description: Return only persistent volumes belonging to this cluster.
      schema:
        type: string
        format: uuid

    PersistentVolumeClaimId:
      name: id
      in: path
      required: true
      description: Server-assigned persistent volume claim identifier.
      schema:
        type: string
        format: uuid

    PersistentVolumeClaimNamespaceIdFilter:
      name: namespace_id
      in: query
      required: false
      description: Return only persistent volume claims belonging to this namespace.
      schema:
        type: string
        format: uuid

    Limit:
      name: limit
      in: query
      required: false
      description: Maximum number of items to return. Server clamps to [1, 200].
      schema:
        type: integer
        minimum: 1
        maximum: 200
        default: 50

    Cursor:
      name: cursor
      in: query
      required: false
      description: Opaque cursor returned from a previous list response.
      schema:
        type: string
        maxLength: 512

  responses:

    BadRequest:
      description: Malformed request.
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'

    Unauthorized:
      description: Missing or invalid bearer token.
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'

    Forbidden:
      description: Token is valid but lacks the scope required by the operation.
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'

    NotFound:
      description: Resource not found.
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'

    Conflict:
      description: Conflict with current state (e.g., duplicate name).
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'

  schemas:

    Health:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [ok]
        version:
          type: string
          description: Build version of the running argosd.

    Layer:
      type: string
      description: |
        ANSSI cartography layer the asset belongs to. See ADR-0002 for the
        kind-to-layer mapping and the rationale behind the six-layer model.
      enum:
        - ecosystem
        - business
        - applicative
        - administration
        - infrastructure_logical
        - infrastructure_physical

    Problem:
      description: RFC 7807 problem details.
      type: object
      required: [type, title, status]
      properties:
        type:
          type: string
          format: uri
          default: about:blank
        title:
          type: string
        status:
          type: integer
          minimum: 100
          maximum: 599
        detail:
          type: string
        instance:
          type: string
          format: uri
        errors:
          type: array
          description: Field-level validation errors, when applicable.
          items:
            type: object
            required: [field, message]
            properties:
              field:
                type: string
              message:
                type: string

    ClusterMutable:
      description: Fields on a Cluster that clients may set and later update.
      type: object
      properties:
        display_name:
          type: string
          maxLength: 256
          description: Human-friendly label, free-form.
        environment:
          type: string
          maxLength: 64
          description: Free-form environment tag (e.g., dev, staging, prod).
        provider:
          type: string
          maxLength: 64
          description: |
            Underlying Kubernetes distribution or hosting provider.
            Open-ended; common values: gke, eks, aks, openshift, rke, kubeadm, onprem, other.
        region:
          type: string
          maxLength: 64
        kubernetes_version:
          type: string
          maxLength: 32
          description: Cluster API server version reported by Kubernetes (e.g. "1.29.5").
        api_endpoint:
          type: string
          format: uri
          description: Kubernetes API server URL (informational).
        labels:
          type: object
          description: Arbitrary user-supplied string key/value labels.
          additionalProperties:
            type: string
            maxLength: 256
          maxProperties: 64

    ClusterCreate:
      description: Payload to register a new cluster.
      allOf:
        - $ref: '#/components/schemas/ClusterMutable'
        - type: object
          required: [name]
          properties:
            name:
              type: string
              description: |
                Stable slug-like identifier, unique across the CMDB.
                Immutable after creation.
              pattern: '^[a-z0-9][a-z0-9-]{0,62}[a-z0-9]$'
              minLength: 2
              maxLength: 64

    ClusterUpdate:
      description: |
        Merge-patch body. Only mutable fields; `name` is immutable.
        Omitted fields are left unchanged.
      allOf:
        - $ref: '#/components/schemas/ClusterMutable'

    Cluster:
      description: A Kubernetes cluster registered in the CMDB.
      allOf:
        - $ref: '#/components/schemas/ClusterMutable'
        - type: object
          required: [id, name, layer, created_at, updated_at]
          properties:
            id:
              type: string
              format: uuid
              readOnly: true
            name:
              type: string
              pattern: '^[a-z0-9][a-z0-9-]{0,62}[a-z0-9]$'
              minLength: 2
              maxLength: 64
            layer:
              allOf:
                - $ref: '#/components/schemas/Layer'
              readOnly: true
              description: Always `infrastructure_logical` for Cluster. Set by the server.
            created_at:
              type: string
              format: date-time
              readOnly: true
            updated_at:
              type: string
              format: date-time
              readOnly: true

    ClusterList:
      description: Paged list of clusters.
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Cluster'
        next_cursor:
          type: string
          nullable: true
          description: |
            Opaque cursor to pass as `?cursor=` to fetch the next page.
            Absent or null when no more pages remain.

    NodeMutable:
      description: Fields on a Node that clients may set and later update.
      type: object
      properties:
        display_name:
          type: string
          maxLength: 256
          description: Human-friendly label, free-form.
        kubelet_version:
          type: string
          maxLength: 32
          description: Kubelet git version as reported by Kubernetes (e.g. "v1.29.5").
        os_image:
          type: string
          maxLength: 256
          description: Node OS image string (e.g. "Ubuntu 22.04.3 LTS").
        architecture:
          type: string
          maxLength: 32
          description: |
            CPU architecture. Open-ended; common values: amd64, arm64, ppc64le, s390x.
        labels:
          type: object
          description: Arbitrary user-supplied string key/value labels.
          additionalProperties:
            type: string
            maxLength: 256
          maxProperties: 64

    NodeCreate:
      description: Payload to register a new node under a cluster.
      allOf:
        - $ref: '#/components/schemas/NodeMutable'
        - type: object
          required: [cluster_id, name]
          properties:
            cluster_id:
              type: string
              format: uuid
              description: |
                Parent cluster id. Immutable after creation; the cluster must
                already exist or the create returns 404.
            name:
              type: string
              description: |
                Kubernetes node name (DNS-subdomain style). Unique per cluster.
                Immutable after creation.
              pattern: '^[a-z0-9]([-a-z0-9.]*[a-z0-9])?$'
              minLength: 2
              maxLength: 253

    NodeUpdate:
      description: |
        Merge-patch body. Only mutable fields; `cluster_id` and `name` are
        immutable. Omitted fields are left unchanged.
      allOf:
        - $ref: '#/components/schemas/NodeMutable'

    Node:
      description: A Kubernetes node registered in the CMDB.
      allOf:
        - $ref: '#/components/schemas/NodeMutable'
        - type: object
          required: [id, cluster_id, name, layer, created_at, updated_at]
          properties:
            id:
              type: string
              format: uuid
              readOnly: true
            cluster_id:
              type: string
              format: uuid
            name:
              type: string
              pattern: '^[a-z0-9]([-a-z0-9.]*[a-z0-9])?$'
              minLength: 2
              maxLength: 253
            layer:
              allOf:
                - $ref: '#/components/schemas/Layer'
              readOnly: true
              description: Always `infrastructure_physical` for Node. Set by the server.
            created_at:
              type: string
              format: date-time
              readOnly: true
            updated_at:
              type: string
              format: date-time
              readOnly: true

    NodeList:
      description: Paged list of nodes.
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Node'
        next_cursor:
          type: string
          nullable: true
          description: |
            Opaque cursor to pass as `?cursor=` to fetch the next page.
            Absent or null when no more pages remain.

    NamespaceMutable:
      description: Fields on a Namespace that clients may set and later update.
      type: object
      properties:
        display_name:
          type: string
          maxLength: 256
          description: Human-friendly label, free-form.
        phase:
          type: string
          maxLength: 32
          description: |
            Kubernetes namespace phase as last observed (e.g. "Active", "Terminating").
            Open-ended to accommodate any additional phases Kubernetes introduces.
        labels:
          type: object
          description: Arbitrary user-supplied string key/value labels.
          additionalProperties:
            type: string
            maxLength: 256
          maxProperties: 64

    NamespaceCreate:
      description: Payload to register a new namespace under a cluster.
      allOf:
        - $ref: '#/components/schemas/NamespaceMutable'
        - type: object
          required: [cluster_id, name]
          properties:
            cluster_id:
              type: string
              format: uuid
              description: |
                Parent cluster id. Immutable after creation; the cluster must
                already exist or the create returns 404.
            name:
              type: string
              description: |
                Kubernetes namespace name (DNS-label style). Unique per cluster.
                Immutable after creation.
              pattern: '^[a-z0-9]([-a-z0-9]*[a-z0-9])?$'
              minLength: 1
              maxLength: 63

    NamespaceUpdate:
      description: |
        Merge-patch body. Only mutable fields; `cluster_id` and `name` are
        immutable. Omitted fields are left unchanged.
      allOf:
        - $ref: '#/components/schemas/NamespaceMutable'

    Namespace:
      description: A Kubernetes namespace registered in the CMDB.
      allOf:
        - $ref: '#/components/schemas/NamespaceMutable'
        - type: object
          required: [id, cluster_id, name, layer, created_at, updated_at]
          properties:
            id:
              type: string
              format: uuid
              readOnly: true
            cluster_id:
              type: string
              format: uuid
            name:
              type: string
              pattern: '^[a-z0-9]([-a-z0-9]*[a-z0-9])?$'
              minLength: 1
              maxLength: 63
            layer:
              allOf:
                - $ref: '#/components/schemas/Layer'
              readOnly: true
              description: Always `infrastructure_logical` for Namespace. Set by the server.
            created_at:
              type: string
              format: date-time
              readOnly: true
            updated_at:
              type: string
              format: date-time
              readOnly: true

    NamespaceList:
      description: Paged list of namespaces.
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Namespace'
        next_cursor:
          type: string
          nullable: true
          description: |
            Opaque cursor to pass as `?cursor=` to fetch the next page.
            Absent or null when no more pages remain.

    ContainerList:
      type: array
      description: |
        Containers associated with the resource. For Pods this reflects the
        live runtime (name, image, image_id from containerStatuses, init
        flag); for Workloads it's the pod template's declared containers
        (name, image, init). Opaque in v1: each entry's shape is additive,
        so new collector-extracted fields don't require a spec bump.
      items:
        type: object
        additionalProperties: true

    PodMutable:
      description: Fields on a Pod that clients may set and later update.
      type: object
      properties:
        phase:
          type: string
          maxLength: 32
          description: |
            Kubernetes pod phase as last observed: Pending, Running, Succeeded,
            Failed, or Unknown. Open-ended to accommodate any additional phases.
        node_name:
          type: string
          maxLength: 253
          description: Name of the node the pod is scheduled on.
        pod_ip:
          type: string
          maxLength: 45
          description: |
            Pod IP address (IPv4 or IPv6). Informational; not validated as an
            IP literal.
        containers:
          $ref: '#/components/schemas/ContainerList'
        workload_id:
          type: string
          format: uuid
          nullable: true
          description: |
            Top-level Workload that controls this pod (Deployment /
            StatefulSet / DaemonSet). The collector walks the K8s
            ownerReference chain — for Deployment-owned pods this resolves
            Pod -> ReplicaSet -> Deployment. Null for pods with no
            controller or with an owner kind argosd doesn't model yet
            (e.g., Job, CronJob).
        labels:
          type: object
          description: Arbitrary user-supplied string key/value labels.
          additionalProperties:
            type: string
            maxLength: 256
          maxProperties: 64

    PodCreate:
      description: Payload to register a new pod under a namespace.
      allOf:
        - $ref: '#/components/schemas/PodMutable'
        - type: object
          required: [namespace_id, name]
          properties:
            namespace_id:
              type: string
              format: uuid
              description: |
                Parent namespace id. Immutable after creation; the namespace
                must already exist or the create returns 404.
            name:
              type: string
              description: |
                Kubernetes pod name (DNS-subdomain style). Unique per namespace.
                Immutable after creation.
              pattern: '^[a-z0-9]([-a-z0-9.]*[a-z0-9])?$'
              minLength: 1
              maxLength: 253

    PodUpdate:
      description: |
        Merge-patch body. Only mutable fields; `namespace_id` and `name` are
        immutable. Omitted fields are left unchanged.
      allOf:
        - $ref: '#/components/schemas/PodMutable'

    Pod:
      description: A Kubernetes pod registered in the CMDB.
      allOf:
        - $ref: '#/components/schemas/PodMutable'
        - type: object
          required: [id, namespace_id, name, layer, created_at, updated_at]
          properties:
            id:
              type: string
              format: uuid
              readOnly: true
            namespace_id:
              type: string
              format: uuid
            name:
              type: string
              pattern: '^[a-z0-9]([-a-z0-9.]*[a-z0-9])?$'
              minLength: 1
              maxLength: 253
            layer:
              allOf:
                - $ref: '#/components/schemas/Layer'
              readOnly: true
              description: Always `applicative` for Pod. Set by the server.
            created_at:
              type: string
              format: date-time
              readOnly: true
            updated_at:
              type: string
              format: date-time
              readOnly: true

    PodList:
      description: Paged list of pods.
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Pod'
        next_cursor:
          type: string
          nullable: true
          description: |
            Opaque cursor to pass as `?cursor=` to fetch the next page.
            Absent or null when no more pages remain.

    WorkloadKind:
      type: string
      description: |
        Kubernetes workload controller kind. Casing matches the `kind` field
        Kubernetes itself emits. Additional kinds (Job, CronJob, ReplicaSet,
        ReplicationController) may be introduced as new enum values without a
        schema migration (see ADR-0003).
      enum:
        - Deployment
        - StatefulSet
        - DaemonSet

    WorkloadMutable:
      description: Fields on a Workload that clients may set and later update.
      type: object
      properties:
        replicas:
          type: integer
          minimum: 0
          description: Desired replica count. Nullable; DaemonSet has no scalar desired count.
        ready_replicas:
          type: integer
          minimum: 0
          description: Observed ready replica count. Nullable until first status update.
        containers:
          $ref: '#/components/schemas/ContainerList'
        labels:
          type: object
          description: Arbitrary user-supplied string key/value labels.
          additionalProperties:
            type: string
            maxLength: 256
          maxProperties: 64
        spec:
          type: object
          description: |
            Kind-specific fields the collector chooses to persist (e.g. strategy
            for Deployment, service_name for StatefulSet). Open-ended; stored
            as JSONB.
          additionalProperties: true

    WorkloadCreate:
      description: Payload to register a new workload under a namespace.
      allOf:
        - $ref: '#/components/schemas/WorkloadMutable'
        - type: object
          required: [namespace_id, kind, name]
          properties:
            namespace_id:
              type: string
              format: uuid
              description: |
                Parent namespace id. Immutable after creation; the namespace
                must already exist or the create returns 404.
            kind:
              allOf:
                - $ref: '#/components/schemas/WorkloadKind'
              description: |
                Workload kind discriminator. Immutable after creation.
            name:
              type: string
              description: |
                Kubernetes workload name (DNS-subdomain style). Unique per
                (namespace, kind). Immutable after creation.
              pattern: '^[a-z0-9]([-a-z0-9.]*[a-z0-9])?$'
              minLength: 1
              maxLength: 253

    WorkloadUpdate:
      description: |
        Merge-patch body. Only mutable fields; `namespace_id`, `kind`, and
        `name` are immutable. Omitted fields are left unchanged.
      allOf:
        - $ref: '#/components/schemas/WorkloadMutable'

    Workload:
      description: A Kubernetes workload controller registered in the CMDB.
      allOf:
        - $ref: '#/components/schemas/WorkloadMutable'
        - type: object
          required: [id, namespace_id, kind, name, layer, created_at, updated_at]
          properties:
            id:
              type: string
              format: uuid
              readOnly: true
            namespace_id:
              type: string
              format: uuid
            kind:
              $ref: '#/components/schemas/WorkloadKind'
            name:
              type: string
              pattern: '^[a-z0-9]([-a-z0-9.]*[a-z0-9])?$'
              minLength: 1
              maxLength: 253
            layer:
              allOf:
                - $ref: '#/components/schemas/Layer'
              readOnly: true
              description: Always `applicative` for Workload. Set by the server.
            created_at:
              type: string
              format: date-time
              readOnly: true
            updated_at:
              type: string
              format: date-time
              readOnly: true

    WorkloadList:
      description: Paged list of workloads.
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Workload'
        next_cursor:
          type: string
          nullable: true
          description: |
            Opaque cursor to pass as `?cursor=` to fetch the next page.
            Absent or null when no more pages remain.

    ServiceType:
      type: string
      description: |
        Kubernetes Service type. Casing matches the enum Kubernetes itself
        emits. Open-ended at the schema layer to accommodate future additions;
        handler validation enforces the v1 subset.
      enum:
        - ClusterIP
        - NodePort
        - LoadBalancer
        - ExternalName

    ServiceMutable:
      description: Fields on a Service that clients may set and later update.
      type: object
      properties:
        type:
          $ref: '#/components/schemas/ServiceType'
        cluster_ip:
          type: string
          maxLength: 45
          description: Assigned ClusterIP (empty for Headless / ExternalName services).
        selector:
          type: object
          description: Pod label selector. Pods matching every key/value are selected.
          additionalProperties:
            type: string
            maxLength: 256
          maxProperties: 64
        ports:
          type: array
          description: |
            Service ports. Opaque in v1: each entry carries whatever the
            collector chose to persist (name, port, target_port, protocol, node_port).
          items:
            type: object
            additionalProperties: true
        labels:
          type: object
          description: Arbitrary user-supplied string key/value labels.
          additionalProperties:
            type: string
            maxLength: 256
          maxProperties: 64

    ServiceCreate:
      description: Payload to register a new service under a namespace.
      allOf:
        - $ref: '#/components/schemas/ServiceMutable'
        - type: object
          required: [namespace_id, name]
          properties:
            namespace_id:
              type: string
              format: uuid
              description: |
                Parent namespace id. Immutable after creation; the namespace
                must already exist or the create returns 404.
            name:
              type: string
              description: |
                Kubernetes service name (DNS-label style). Unique per namespace.
                Immutable after creation.
              pattern: '^[a-z0-9]([-a-z0-9]*[a-z0-9])?$'
              minLength: 1
              maxLength: 63

    ServiceUpdate:
      description: |
        Merge-patch body. Only mutable fields; `namespace_id` and `name` are
        immutable. Omitted fields are left unchanged.
      allOf:
        - $ref: '#/components/schemas/ServiceMutable'

    Service:
      description: A Kubernetes Service registered in the CMDB.
      allOf:
        - $ref: '#/components/schemas/ServiceMutable'
        - type: object
          required: [id, namespace_id, name, layer, created_at, updated_at]
          properties:
            id:
              type: string
              format: uuid
              readOnly: true
            namespace_id:
              type: string
              format: uuid
            name:
              type: string
              pattern: '^[a-z0-9]([-a-z0-9]*[a-z0-9])?$'
              minLength: 1
              maxLength: 63
            layer:
              allOf:
                - $ref: '#/components/schemas/Layer'
              readOnly: true
              description: Always `applicative` for Service. Set by the server.
            created_at:
              type: string
              format: date-time
              readOnly: true
            updated_at:
              type: string
              format: date-time
              readOnly: true

    ServiceList:
      description: Paged list of services.
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Service'
        next_cursor:
          type: string
          nullable: true
          description: |
            Opaque cursor to pass as `?cursor=` to fetch the next page.
            Absent or null when no more pages remain.

    IngressMutable:
      description: Fields on an Ingress that clients may set and later update.
      type: object
      properties:
        ingress_class_name:
          type: string
          maxLength: 253
          description: IngressClass name the controller binds to (e.g., "nginx", "traefik").
        rules:
          type: array
          description: |
            Ingress routing rules. Opaque in v1: each entry carries whatever the
            collector chose to persist (host, path, path_type, backend service
            name / port).
          items:
            type: object
            additionalProperties: true
        tls:
          type: array
          description: |
            TLS configuration entries. Opaque in v1: each entry carries hosts
            and the referenced Secret name.
          items:
            type: object
            additionalProperties: true
        labels:
          type: object
          description: Arbitrary user-supplied string key/value labels.
          additionalProperties:
            type: string
            maxLength: 256
          maxProperties: 64

    IngressCreate:
      description: Payload to register a new ingress under a namespace.
      allOf:
        - $ref: '#/components/schemas/IngressMutable'
        - type: object
          required: [namespace_id, name]
          properties:
            namespace_id:
              type: string
              format: uuid
              description: |
                Parent namespace id. Immutable after creation; the namespace
                must already exist or the create returns 404.
            name:
              type: string
              description: |
                Kubernetes ingress name (DNS-label style). Unique per namespace.
                Immutable after creation.
              pattern: '^[a-z0-9]([-a-z0-9]*[a-z0-9])?$'
              minLength: 1
              maxLength: 63

    IngressUpdate:
      description: |
        Merge-patch body. Only mutable fields; `namespace_id` and `name` are
        immutable. Omitted fields are left unchanged.
      allOf:
        - $ref: '#/components/schemas/IngressMutable'

    Ingress:
      description: A Kubernetes Ingress registered in the CMDB.
      allOf:
        - $ref: '#/components/schemas/IngressMutable'
        - type: object
          required: [id, namespace_id, name, layer, created_at, updated_at]
          properties:
            id:
              type: string
              format: uuid
              readOnly: true
            namespace_id:
              type: string
              format: uuid
            name:
              type: string
              pattern: '^[a-z0-9]([-a-z0-9]*[a-z0-9])?$'
              minLength: 1
              maxLength: 63
            layer:
              allOf:
                - $ref: '#/components/schemas/Layer'
              readOnly: true
              description: Always `applicative` for Ingress. See ADR-0004.
            created_at:
              type: string
              format: date-time
              readOnly: true
            updated_at:
              type: string
              format: date-time
              readOnly: true

    IngressList:
      description: Paged list of ingresses.
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Ingress'
        next_cursor:
          type: string
          nullable: true
          description: |
            Opaque cursor to pass as `?cursor=` to fetch the next page.
            Absent or null when no more pages remain.

    PersistentVolumeMutable:
      description: Fields on a PersistentVolume that clients may set and later update.
      type: object
      properties:
        capacity:
          type: string
          maxLength: 32
          description: |
            Declared capacity as reported by Kubernetes (e.g. `"10Gi"`).
            Stored verbatim; conversion to bytes is a reader concern.
        access_modes:
          type: array
          description: |
            Kubernetes access modes the PV exposes — any of
            `ReadWriteOnce`, `ReadOnlyMany`, `ReadWriteMany`,
            `ReadWriteOncePod`.
          items:
            type: string
            maxLength: 32
          maxItems: 8
        reclaim_policy:
          type: string
          maxLength: 16
          description: Retain / Delete / Recycle.
        phase:
          type: string
          maxLength: 32
          description: |
            Kubernetes PV phase as last observed: Pending, Available, Bound,
            Released, Failed.
        storage_class_name:
          type: string
          maxLength: 253
        csi_driver:
          type: string
          maxLength: 253
          description: |
            CSI driver name when the PV is CSI-backed (spec.csi.driver).
            Null for in-tree / legacy volume sources.
        volume_handle:
          type: string
          maxLength: 512
          description: |
            Concrete backing storage handle (spec.csi.volumeHandle) — the
            CSI driver's identifier for the underlying disk / share.
        claim_ref_namespace:
          type: string
          maxLength: 253
          description: Namespace of the bound PVC (spec.claimRef.namespace).
        claim_ref_name:
          type: string
          maxLength: 253
          description: Name of the bound PVC (spec.claimRef.name).
        labels:
          type: object
          description: Arbitrary user-supplied string key/value labels.
          additionalProperties:
            type: string
            maxLength: 256
          maxProperties: 64

    PersistentVolumeCreate:
      description: Payload to register a new persistent volume under a cluster.
      allOf:
        - $ref: '#/components/schemas/PersistentVolumeMutable'
        - type: object
          required: [cluster_id, name]
          properties:
            cluster_id:
              type: string
              format: uuid
              description: |
                Parent cluster id. Immutable after creation; the cluster must
                already exist or the create returns 404.
            name:
              type: string
              description: |
                Kubernetes PV name. Cluster-scoped, so unique per cluster.
                Immutable after creation.
              pattern: '^[a-z0-9]([-a-z0-9.]*[a-z0-9])?$'
              minLength: 1
              maxLength: 253

    PersistentVolumeUpdate:
      description: |
        Merge-patch body. Only mutable fields; `cluster_id` and `name` are
        immutable. Omitted fields are left unchanged.
      allOf:
        - $ref: '#/components/schemas/PersistentVolumeMutable'

    PersistentVolume:
      description: A Kubernetes PersistentVolume registered in the CMDB.
      allOf:
        - $ref: '#/components/schemas/PersistentVolumeMutable'
        - type: object
          required: [id, cluster_id, name, layer, created_at, updated_at]
          properties:
            id:
              type: string
              format: uuid
              readOnly: true
            cluster_id:
              type: string
              format: uuid
            name:
              type: string
              pattern: '^[a-z0-9]([-a-z0-9.]*[a-z0-9])?$'
              minLength: 1
              maxLength: 253
            layer:
              allOf:
                - $ref: '#/components/schemas/Layer'
              readOnly: true
              description: Always `infrastructure_physical` for PersistentVolume. Set by the server.
            created_at:
              type: string
              format: date-time
              readOnly: true
            updated_at:
              type: string
              format: date-time
              readOnly: true

    PersistentVolumeList:
      description: Paged list of persistent volumes.
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/PersistentVolume'
        next_cursor:
          type: string
          nullable: true
          description: |
            Opaque cursor to pass as `?cursor=` to fetch the next page.
            Absent or null when no more pages remain.

    PersistentVolumeClaimMutable:
      description: Fields on a PVC that clients may set and later update.
      type: object
      properties:
        phase:
          type: string
          maxLength: 32
          description: |
            Kubernetes PVC phase as last observed: Pending, Bound, Lost.
        storage_class_name:
          type: string
          maxLength: 253
        volume_name:
          type: string
          maxLength: 253
          description: |
            Raw `spec.volumeName` — the PV name this claim is bound to.
            Carries the string even when the corresponding PV row hasn't
            been ingested yet.
        bound_volume_id:
          type: string
          format: uuid
          nullable: true
          description: |
            FK to the PersistentVolume this PVC is bound to. Null for
            Pending PVCs or if the PV row has been deleted
            (ON DELETE SET NULL).
        access_modes:
          type: array
          items:
            type: string
            maxLength: 32
          maxItems: 8
        requested_storage:
          type: string
          maxLength: 32
          description: |
            Requested size (spec.resources.requests.storage), verbatim
            (e.g. `"5Gi"`).
        labels:
          type: object
          description: Arbitrary user-supplied string key/value labels.
          additionalProperties:
            type: string
            maxLength: 256
          maxProperties: 64

    PersistentVolumeClaimCreate:
      description: Payload to register a new PVC under a namespace.
      allOf:
        - $ref: '#/components/schemas/PersistentVolumeClaimMutable'
        - type: object
          required: [namespace_id, name]
          properties:
            namespace_id:
              type: string
              format: uuid
              description: |
                Parent namespace id. Immutable after creation; the namespace
                must already exist or the create returns 404.
            name:
              type: string
              description: |
                Kubernetes PVC name (DNS-subdomain style). Unique per
                namespace. Immutable after creation.
              pattern: '^[a-z0-9]([-a-z0-9.]*[a-z0-9])?$'
              minLength: 1
              maxLength: 253

    PersistentVolumeClaimUpdate:
      description: |
        Merge-patch body. Only mutable fields; `namespace_id` and `name`
        are immutable. Omitted fields are left unchanged.
      allOf:
        - $ref: '#/components/schemas/PersistentVolumeClaimMutable'

    PersistentVolumeClaim:
      description: A Kubernetes PersistentVolumeClaim registered in the CMDB.
      allOf:
        - $ref: '#/components/schemas/PersistentVolumeClaimMutable'
        - type: object
          required: [id, namespace_id, name, layer, created_at, updated_at]
          properties:
            id:
              type: string
              format: uuid
              readOnly: true
            namespace_id:
              type: string
              format: uuid
            name:
              type: string
              pattern: '^[a-z0-9]([-a-z0-9.]*[a-z0-9])?$'
              minLength: 1
              maxLength: 253
            layer:
              allOf:
                - $ref: '#/components/schemas/Layer'
              readOnly: true
              description: Always `applicative` for PersistentVolumeClaim. Set by the server.
            created_at:
              type: string
              format: date-time
              readOnly: true
            updated_at:
              type: string
              format: date-time
              readOnly: true

    PersistentVolumeClaimList:
      description: Paged list of persistent volume claims.
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/PersistentVolumeClaim'
        next_cursor:
          type: string
          nullable: true
          description: |
            Opaque cursor to pass as `?cursor=` to fetch the next page.
            Absent or null when no more pages remain.
