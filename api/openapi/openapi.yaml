openapi: 3.1.0

info:
  title: Argos CMDB API
  version: 0.1.0
  summary: Kubernetes-centric CMDB aligned with the ANSSI SecNumCloud framework.
  description: |
    REST API for **Argos**, a CMDB for Kubernetes environments aligned with the
    ANSSI SecNumCloud (SNC) qualification framework.

    This version (0.1.0) is a walking skeleton covering:
      - Liveness and readiness probes
      - `Cluster` resource CRUD

    Subsequent versions will add Node, Namespace, Workload, Pod, and other
    Kubernetes entity kinds mapped onto the ANSSI cartography layers.

    Errors follow RFC 7807 (`application/problem+json`).

servers:
  - url: http://localhost:8080
    description: Local development

tags:
  - name: health
    description: Liveness and readiness probes (unauthenticated).
  - name: clusters
    description: Kubernetes clusters registered in the CMDB.
  - name: nodes
    description: Kubernetes nodes (worker / control-plane machines) within a cluster.
  - name: namespaces
    description: Kubernetes namespaces within a cluster.
  - name: pods
    description: Kubernetes pods — the atomic applicative workload units.

security:
  - BearerAuth: []

paths:

  /healthz:
    get:
      tags: [health]
      summary: Liveness probe
      operationId: getHealthz
      security: []
      responses:
        '200':
          description: Service is alive.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Health'

  /readyz:
    get:
      tags: [health]
      summary: Readiness probe
      description: Verifies downstream dependencies (database) are reachable.
      operationId: getReadyz
      security: []
      responses:
        '200':
          description: Service is ready to serve traffic.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Health'
        '503':
          description: Service is not ready.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'

  /v1/clusters:
    get:
      tags: [clusters]
      summary: List clusters
      operationId: listClusters
      security:
        - BearerAuth: [read]
      parameters:
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Cursor'
      responses:
        '200':
          description: Paged list of clusters.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClusterList'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

    post:
      tags: [clusters]
      summary: Register a cluster
      operationId: createCluster
      security:
        - BearerAuth: [write]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ClusterCreate'
      responses:
        '201':
          description: Cluster created.
          headers:
            Location:
              description: URI of the newly created cluster.
              schema:
                type: string
                format: uri
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Cluster'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          $ref: '#/components/responses/Conflict'

  /v1/clusters/{id}:
    parameters:
      - $ref: '#/components/parameters/ClusterId'
    get:
      tags: [clusters]
      summary: Get a cluster
      operationId: getCluster
      security:
        - BearerAuth: [read]
      responses:
        '200':
          description: Cluster details.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Cluster'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

    patch:
      tags: [clusters]
      summary: Update mutable fields of a cluster
      description: |
        Merge-patch semantics: fields omitted from the body are unchanged.
        `name` is immutable after creation.
      operationId: updateCluster
      security:
        - BearerAuth: [write]
      requestBody:
        required: true
        content:
          application/merge-patch+json:
            schema:
              $ref: '#/components/schemas/ClusterUpdate'
      responses:
        '200':
          description: Updated cluster.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Cluster'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

    delete:
      tags: [clusters]
      summary: Delete a cluster
      operationId: deleteCluster
      security:
        - BearerAuth: [delete]
      responses:
        '204':
          description: Cluster deleted.
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /v1/nodes:
    get:
      tags: [nodes]
      summary: List nodes
      operationId: listNodes
      security:
        - BearerAuth: [read]
      parameters:
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/NodeClusterIdFilter'
      responses:
        '200':
          description: Paged list of nodes.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NodeList'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

    post:
      tags: [nodes]
      summary: Register a node
      operationId: createNode
      security:
        - BearerAuth: [write]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NodeCreate'
      responses:
        '201':
          description: Node created.
          headers:
            Location:
              description: URI of the newly created node.
              schema:
                type: string
                format: uri
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Node'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'

  /v1/nodes/{id}:
    parameters:
      - $ref: '#/components/parameters/NodeId'
    get:
      tags: [nodes]
      summary: Get a node
      operationId: getNode
      security:
        - BearerAuth: [read]
      responses:
        '200':
          description: Node details.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Node'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

    patch:
      tags: [nodes]
      summary: Update mutable fields of a node
      description: |
        Merge-patch semantics: fields omitted from the body are unchanged.
        `cluster_id` and `name` are immutable after creation.
      operationId: updateNode
      security:
        - BearerAuth: [write]
      requestBody:
        required: true
        content:
          application/merge-patch+json:
            schema:
              $ref: '#/components/schemas/NodeUpdate'
      responses:
        '200':
          description: Updated node.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Node'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

    delete:
      tags: [nodes]
      summary: Delete a node
      operationId: deleteNode
      security:
        - BearerAuth: [delete]
      responses:
        '204':
          description: Node deleted.
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /v1/namespaces:
    get:
      tags: [namespaces]
      summary: List namespaces
      operationId: listNamespaces
      security:
        - BearerAuth: [read]
      parameters:
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/NamespaceClusterIdFilter'
      responses:
        '200':
          description: Paged list of namespaces.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NamespaceList'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

    post:
      tags: [namespaces]
      summary: Register a namespace
      operationId: createNamespace
      security:
        - BearerAuth: [write]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NamespaceCreate'
      responses:
        '201':
          description: Namespace created.
          headers:
            Location:
              description: URI of the newly created namespace.
              schema:
                type: string
                format: uri
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Namespace'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'

  /v1/namespaces/{id}:
    parameters:
      - $ref: '#/components/parameters/NamespaceId'
    get:
      tags: [namespaces]
      summary: Get a namespace
      operationId: getNamespace
      security:
        - BearerAuth: [read]
      responses:
        '200':
          description: Namespace details.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Namespace'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

    patch:
      tags: [namespaces]
      summary: Update mutable fields of a namespace
      description: |
        Merge-patch semantics: fields omitted from the body are unchanged.
        `cluster_id` and `name` are immutable after creation.
      operationId: updateNamespace
      security:
        - BearerAuth: [write]
      requestBody:
        required: true
        content:
          application/merge-patch+json:
            schema:
              $ref: '#/components/schemas/NamespaceUpdate'
      responses:
        '200':
          description: Updated namespace.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Namespace'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

    delete:
      tags: [namespaces]
      summary: Delete a namespace
      operationId: deleteNamespace
      security:
        - BearerAuth: [delete]
      responses:
        '204':
          description: Namespace deleted.
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /v1/pods:
    get:
      tags: [pods]
      summary: List pods
      operationId: listPods
      security:
        - BearerAuth: [read]
      parameters:
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/PodNamespaceIdFilter'
      responses:
        '200':
          description: Paged list of pods.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PodList'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

    post:
      tags: [pods]
      summary: Register a pod
      operationId: createPod
      security:
        - BearerAuth: [write]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PodCreate'
      responses:
        '201':
          description: Pod created.
          headers:
            Location:
              description: URI of the newly created pod.
              schema:
                type: string
                format: uri
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Pod'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'

  /v1/pods/{id}:
    parameters:
      - $ref: '#/components/parameters/PodId'
    get:
      tags: [pods]
      summary: Get a pod
      operationId: getPod
      security:
        - BearerAuth: [read]
      responses:
        '200':
          description: Pod details.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Pod'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

    patch:
      tags: [pods]
      summary: Update mutable fields of a pod
      description: |
        Merge-patch semantics: fields omitted from the body are unchanged.
        `namespace_id` and `name` are immutable after creation.
      operationId: updatePod
      security:
        - BearerAuth: [write]
      requestBody:
        required: true
        content:
          application/merge-patch+json:
            schema:
              $ref: '#/components/schemas/PodUpdate'
      responses:
        '200':
          description: Updated pod.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Pod'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

    delete:
      tags: [pods]
      summary: Delete a pod
      operationId: deletePod
      security:
        - BearerAuth: [delete]
      responses:
        '204':
          description: Pod deleted.
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

components:

  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: token
      description: |
        API token issued out-of-band. Send as `Authorization: Bearer <token>`.

        Scopes granted to a token:
          - `read`   — list and get operations
          - `write`  — create and update (implies `read` at the caller's discretion)
          - `delete` — remove resources
          - `admin`  — all of the above; reserved for future admin-only endpoints

        Tokens carrying the `admin` scope implicitly satisfy any scope required
        by an operation.

  parameters:

    ClusterId:
      name: id
      in: path
      required: true
      description: Server-assigned cluster identifier.
      schema:
        type: string
        format: uuid

    NodeId:
      name: id
      in: path
      required: true
      description: Server-assigned node identifier.
      schema:
        type: string
        format: uuid

    NodeClusterIdFilter:
      name: cluster_id
      in: query
      required: false
      description: Return only nodes belonging to this cluster.
      schema:
        type: string
        format: uuid

    NamespaceId:
      name: id
      in: path
      required: true
      description: Server-assigned namespace identifier.
      schema:
        type: string
        format: uuid

    NamespaceClusterIdFilter:
      name: cluster_id
      in: query
      required: false
      description: Return only namespaces belonging to this cluster.
      schema:
        type: string
        format: uuid

    PodId:
      name: id
      in: path
      required: true
      description: Server-assigned pod identifier.
      schema:
        type: string
        format: uuid

    PodNamespaceIdFilter:
      name: namespace_id
      in: query
      required: false
      description: Return only pods belonging to this namespace.
      schema:
        type: string
        format: uuid

    Limit:
      name: limit
      in: query
      required: false
      description: Maximum number of items to return. Server clamps to [1, 200].
      schema:
        type: integer
        minimum: 1
        maximum: 200
        default: 50

    Cursor:
      name: cursor
      in: query
      required: false
      description: Opaque cursor returned from a previous list response.
      schema:
        type: string
        maxLength: 512

  responses:

    BadRequest:
      description: Malformed request.
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'

    Unauthorized:
      description: Missing or invalid bearer token.
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'

    Forbidden:
      description: Token is valid but lacks the scope required by the operation.
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'

    NotFound:
      description: Resource not found.
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'

    Conflict:
      description: Conflict with current state (e.g., duplicate name).
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'

  schemas:

    Health:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [ok]
        version:
          type: string
          description: Build version of the running argosd.

    Layer:
      type: string
      description: |
        ANSSI cartography layer the asset belongs to. See ADR-0002 for the
        kind-to-layer mapping and the rationale behind the six-layer model.
      enum:
        - ecosystem
        - business
        - applicative
        - administration
        - infrastructure_logical
        - infrastructure_physical

    Problem:
      description: RFC 7807 problem details.
      type: object
      required: [type, title, status]
      properties:
        type:
          type: string
          format: uri
          default: about:blank
        title:
          type: string
        status:
          type: integer
          minimum: 100
          maximum: 599
        detail:
          type: string
        instance:
          type: string
          format: uri
        errors:
          type: array
          description: Field-level validation errors, when applicable.
          items:
            type: object
            required: [field, message]
            properties:
              field:
                type: string
              message:
                type: string

    ClusterMutable:
      description: Fields on a Cluster that clients may set and later update.
      type: object
      properties:
        display_name:
          type: string
          maxLength: 256
          description: Human-friendly label, free-form.
        environment:
          type: string
          maxLength: 64
          description: Free-form environment tag (e.g., dev, staging, prod).
        provider:
          type: string
          maxLength: 64
          description: |
            Underlying Kubernetes distribution or hosting provider.
            Open-ended; common values: gke, eks, aks, openshift, rke, kubeadm, onprem, other.
        region:
          type: string
          maxLength: 64
        kubernetes_version:
          type: string
          maxLength: 32
          description: Cluster API server version reported by Kubernetes (e.g. "1.29.5").
        api_endpoint:
          type: string
          format: uri
          description: Kubernetes API server URL (informational).
        labels:
          type: object
          description: Arbitrary user-supplied string key/value labels.
          additionalProperties:
            type: string
            maxLength: 256
          maxProperties: 64

    ClusterCreate:
      description: Payload to register a new cluster.
      allOf:
        - $ref: '#/components/schemas/ClusterMutable'
        - type: object
          required: [name]
          properties:
            name:
              type: string
              description: |
                Stable slug-like identifier, unique across the CMDB.
                Immutable after creation.
              pattern: '^[a-z0-9][a-z0-9-]{0,62}[a-z0-9]$'
              minLength: 2
              maxLength: 64

    ClusterUpdate:
      description: |
        Merge-patch body. Only mutable fields; `name` is immutable.
        Omitted fields are left unchanged.
      allOf:
        - $ref: '#/components/schemas/ClusterMutable'

    Cluster:
      description: A Kubernetes cluster registered in the CMDB.
      allOf:
        - $ref: '#/components/schemas/ClusterMutable'
        - type: object
          required: [id, name, layer, created_at, updated_at]
          properties:
            id:
              type: string
              format: uuid
              readOnly: true
            name:
              type: string
              pattern: '^[a-z0-9][a-z0-9-]{0,62}[a-z0-9]$'
              minLength: 2
              maxLength: 64
            layer:
              allOf:
                - $ref: '#/components/schemas/Layer'
              readOnly: true
              description: Always `infrastructure_logical` for Cluster. Set by the server.
            created_at:
              type: string
              format: date-time
              readOnly: true
            updated_at:
              type: string
              format: date-time
              readOnly: true

    ClusterList:
      description: Paged list of clusters.
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Cluster'
        next_cursor:
          type: string
          nullable: true
          description: |
            Opaque cursor to pass as `?cursor=` to fetch the next page.
            Absent or null when no more pages remain.

    NodeMutable:
      description: Fields on a Node that clients may set and later update.
      type: object
      properties:
        display_name:
          type: string
          maxLength: 256
          description: Human-friendly label, free-form.
        kubelet_version:
          type: string
          maxLength: 32
          description: Kubelet git version as reported by Kubernetes (e.g. "v1.29.5").
        os_image:
          type: string
          maxLength: 256
          description: Node OS image string (e.g. "Ubuntu 22.04.3 LTS").
        architecture:
          type: string
          maxLength: 32
          description: |
            CPU architecture. Open-ended; common values: amd64, arm64, ppc64le, s390x.
        labels:
          type: object
          description: Arbitrary user-supplied string key/value labels.
          additionalProperties:
            type: string
            maxLength: 256
          maxProperties: 64

    NodeCreate:
      description: Payload to register a new node under a cluster.
      allOf:
        - $ref: '#/components/schemas/NodeMutable'
        - type: object
          required: [cluster_id, name]
          properties:
            cluster_id:
              type: string
              format: uuid
              description: |
                Parent cluster id. Immutable after creation; the cluster must
                already exist or the create returns 404.
            name:
              type: string
              description: |
                Kubernetes node name (DNS-subdomain style). Unique per cluster.
                Immutable after creation.
              pattern: '^[a-z0-9]([-a-z0-9.]*[a-z0-9])?$'
              minLength: 2
              maxLength: 253

    NodeUpdate:
      description: |
        Merge-patch body. Only mutable fields; `cluster_id` and `name` are
        immutable. Omitted fields are left unchanged.
      allOf:
        - $ref: '#/components/schemas/NodeMutable'

    Node:
      description: A Kubernetes node registered in the CMDB.
      allOf:
        - $ref: '#/components/schemas/NodeMutable'
        - type: object
          required: [id, cluster_id, name, layer, created_at, updated_at]
          properties:
            id:
              type: string
              format: uuid
              readOnly: true
            cluster_id:
              type: string
              format: uuid
            name:
              type: string
              pattern: '^[a-z0-9]([-a-z0-9.]*[a-z0-9])?$'
              minLength: 2
              maxLength: 253
            layer:
              allOf:
                - $ref: '#/components/schemas/Layer'
              readOnly: true
              description: Always `infrastructure_physical` for Node. Set by the server.
            created_at:
              type: string
              format: date-time
              readOnly: true
            updated_at:
              type: string
              format: date-time
              readOnly: true

    NodeList:
      description: Paged list of nodes.
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Node'
        next_cursor:
          type: string
          nullable: true
          description: |
            Opaque cursor to pass as `?cursor=` to fetch the next page.
            Absent or null when no more pages remain.

    NamespaceMutable:
      description: Fields on a Namespace that clients may set and later update.
      type: object
      properties:
        display_name:
          type: string
          maxLength: 256
          description: Human-friendly label, free-form.
        phase:
          type: string
          maxLength: 32
          description: |
            Kubernetes namespace phase as last observed (e.g. "Active", "Terminating").
            Open-ended to accommodate any additional phases Kubernetes introduces.
        labels:
          type: object
          description: Arbitrary user-supplied string key/value labels.
          additionalProperties:
            type: string
            maxLength: 256
          maxProperties: 64

    NamespaceCreate:
      description: Payload to register a new namespace under a cluster.
      allOf:
        - $ref: '#/components/schemas/NamespaceMutable'
        - type: object
          required: [cluster_id, name]
          properties:
            cluster_id:
              type: string
              format: uuid
              description: |
                Parent cluster id. Immutable after creation; the cluster must
                already exist or the create returns 404.
            name:
              type: string
              description: |
                Kubernetes namespace name (DNS-label style). Unique per cluster.
                Immutable after creation.
              pattern: '^[a-z0-9]([-a-z0-9]*[a-z0-9])?$'
              minLength: 1
              maxLength: 63

    NamespaceUpdate:
      description: |
        Merge-patch body. Only mutable fields; `cluster_id` and `name` are
        immutable. Omitted fields are left unchanged.
      allOf:
        - $ref: '#/components/schemas/NamespaceMutable'

    Namespace:
      description: A Kubernetes namespace registered in the CMDB.
      allOf:
        - $ref: '#/components/schemas/NamespaceMutable'
        - type: object
          required: [id, cluster_id, name, layer, created_at, updated_at]
          properties:
            id:
              type: string
              format: uuid
              readOnly: true
            cluster_id:
              type: string
              format: uuid
            name:
              type: string
              pattern: '^[a-z0-9]([-a-z0-9]*[a-z0-9])?$'
              minLength: 1
              maxLength: 63
            layer:
              allOf:
                - $ref: '#/components/schemas/Layer'
              readOnly: true
              description: Always `infrastructure_logical` for Namespace. Set by the server.
            created_at:
              type: string
              format: date-time
              readOnly: true
            updated_at:
              type: string
              format: date-time
              readOnly: true

    NamespaceList:
