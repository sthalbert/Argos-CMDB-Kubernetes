      description: A Kubernetes PersistentVolumeClaim registered in the CMDB.
      allOf:
        - $ref: '#/components/schemas/PersistentVolumeClaimMutable'
        - type: object
          required: [id, namespace_id, name, layer, created_at, updated_at]
          properties:
            id:
              type: string
              format: uuid
              readOnly: true
            namespace_id:
              type: string
              format: uuid
            name:
              type: string
              pattern: '^[a-z0-9]([-a-z0-9.]*[a-z0-9])?$'
              minLength: 1
              maxLength: 253
            layer:
              allOf:
                - $ref: '#/components/schemas/Layer'
              readOnly: true
              description: Always `applicative` for PersistentVolumeClaim. Set by the server.
            created_at:
              type: string
              format: date-time
              readOnly: true
            updated_at:
              type: string
              format: date-time
              readOnly: true

    PersistentVolumeClaimList:
      description: Paged list of persistent volume claims.
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/PersistentVolumeClaim'
        next_cursor:
          type: string
          nullable: true
          description: |
            Opaque cursor to pass as `?cursor=` to fetch the next page.
            Absent or null when no more pages remain.

    Role:
      type: string
      description: |
        Fixed role set per ADR-0007. Each role maps to a fixed scope set —
        the scope check in the OpenAPI `security` blocks is unchanged, the
        session middleware just attaches the scopes derived from role.
      enum:
        - admin
        - editor
        - auditor
        - viewer

    AuthConfig:
      description: |
        Pre-login auth configuration needed by the UI. Intentionally
        readable without auth so the login page can render the OIDC
        button before the user has a session.
      type: object
      required: [oidc]
      properties:
        oidc:
          type: object
          required: [enabled]
          properties:
            enabled:
              type: boolean
            label:
              type: string
              description: |
                Button label on the login page, e.g. "Sign in with
                Okta". Controlled by `ARGOS_OIDC_LABEL`.

    LoginRequest:
      description: Username + password, both required.
      type: object
      required: [username, password]
      properties:
        username:
          type: string
          maxLength: 256
        password:
          type: string
          maxLength: 1024

    ChangePasswordRequest:
      description: Current password + new password.
      type: object
      required: [current_password, new_password]
      properties:
        current_password:
          type: string
          maxLength: 1024
        new_password:
          type: string
          description: |
            Minimum 12 characters per NIST 800-63B guidance. No other
            composition rules — a long passphrase is acceptable and
            preferred over short complex strings.
          minLength: 12
          maxLength: 1024

    Me:
      description: Caller identity, role, and effective scopes.
      type: object
      required: [kind, scopes]
      properties:
        kind:
          type: string
          enum: [user, token]
          description: |
            `user` when authenticated via session cookie, `token` when
            via `Authorization: Bearer`. UIs render accordingly.
        id:
          type: string
          format: uuid
          description: User id when kind=user, token id when kind=token.
        username:
          type: string
          description: Present when kind=user.
        token_name:
          type: string
          description: Present when kind=token.
        role:
          allOf:
            - $ref: '#/components/schemas/Role'
          description: Present when kind=user.
        scopes:
          type: array
          items:
            type: string
          description: Effective scopes after role→scope mapping or token declaration.
        must_change_password:
          type: boolean
          description: |
            Present when kind=user. True for bootstrap admins and users
            whose password was reset by an admin — the UI blocks every
            route except `/change-password` until this is cleared.

    User:
      description: A human user registered in argosd.
      type: object
      required: [id, username, role, created_at, updated_at]
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        username:
          type: string
          maxLength: 256
        role:
          $ref: '#/components/schemas/Role'
        must_change_password:
          type: boolean
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
        last_login_at:
          type: string
          format: date-time
          nullable: true
          readOnly: true
        disabled_at:
          type: string
          format: date-time
          nullable: true
          readOnly: true

    UserCreate:
      description: Payload to create a new human user.
      type: object
      required: [username, password, role]
      properties:
        username:
          type: string
          pattern: '^[a-zA-Z0-9._-]+$'
          minLength: 1
          maxLength: 256
        password:
          type: string
          minLength: 12
          maxLength: 1024
        role:
          $ref: '#/components/schemas/Role'
        must_change_password:
          type: boolean
          description: |
            Default true — the standard "admin provisions, user rotates on
            first login" flow. Set false for seeded users in automation.

    UserUpdate:
      description: |
        Merge-patch body. Setting `password` rehashes and forces
        `must_change_password=true`. Setting `disabled=true` revokes
        every active session for the user.
      type: object
      properties:
        role:
          $ref: '#/components/schemas/Role'
        password:
          type: string
          minLength: 12
          maxLength: 1024
        must_change_password:
          type: boolean
        disabled:
          type: boolean

    UserList:
      description: Paged list of users.
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/User'
        next_cursor:
          type: string
          nullable: true

    ApiToken:
      description: |
        Metadata for a machine token. The plaintext is never in this
        response — it's only returned once by `createApiToken`.
      type: object
      required: [id, name, prefix, scopes, created_by_user_id, created_at]
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        name:
          type: string
          description: Human-chosen label (e.g., `"ci-release-pipeline"`).
          maxLength: 256
        prefix:
          type: string
          description: |
            First 8 characters of the plaintext token. Displayed alongside
            the token name so operators can identify which token is in use
            without revealing the full value.
          readOnly: true
        scopes:
          type: array
          items:
            type: string
        created_by_user_id:
          type: string
          format: uuid
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        last_used_at:
          type: string
          format: date-time
          nullable: true
          readOnly: true
        expires_at:
          type: string
          format: date-time
          nullable: true
        revoked_at:
          type: string
          format: date-time
          nullable: true
          readOnly: true

    ApiTokenCreate:
      description: Payload to mint a new machine token.
      type: object
      required: [name, scopes]
      properties:
        name:
          type: string
          maxLength: 256
        scopes:
          type: array
          items:
            type: string
            enum: [read, write, delete]
          minItems: 1
          description: |
            Scopes to grant. Admin scope cannot be granted to tokens —
            admin-only endpoints are session-only for accountability.
        expires_at:
          type: string
          format: date-time
          nullable: true
          description: Optional expiry. If absent, the token is valid until revoked.

    ApiTokenMint:
      description: |
        Response returned by `createApiToken`. The `token` field carries
        the full plaintext — copy it now, it won't appear anywhere else.
      allOf:
        - $ref: '#/components/schemas/ApiToken'
        - type: object
          required: [token]
          properties:
            token:
              type: string
              description: |
                Plaintext token, format `argos_pat_<8chars>_<random>`.
                Presented exactly once. Store in a secrets manager; do
                not commit to source control.

    ApiTokenList:
      description: Paged list of tokens.
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/ApiToken'
        next_cursor:
          type: string
          nullable: true

    Session:
      description: An active human session.
      type: object
      required: [id, user_id, created_at, last_used_at, expires_at]
      properties:
        id:
          type: string
          description: |
            Session identifier. Only the prefix is shown to admins;
            the full id is never leaked in a list response.
        user_id:
          type: string
          format: uuid
        username:
          type: string
          description: Denormalised for admin convenience.
        created_at:
          type: string
          format: date-time
        last_used_at:
          type: string
          format: date-time
        expires_at:
          type: string
          format: date-time
        user_agent:
          type: string
          nullable: true
        source_ip:
          type: string
          nullable: true

    SessionList:
      description: Paged list of active sessions.
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Session'
        next_cursor:
          type: string
          nullable: true

    AuditEvent:
      description: |
        One recorded API action. Written by the audit middleware after
        the wrapped handler completes; never updated in place.
      type: object
      required: [id, occurred_at, actor_kind, action, http_method, http_path, http_status]
      properties:
        id:
          type: string
          format: uuid
        occurred_at:
          type: string
          format: date-time
        actor_id:
          type: string
          format: uuid
          nullable: true
          description: Null for unauthenticated requests (e.g. failed logins).
        actor_kind:
          type: string
          enum: [user, token, anonymous, system]
        actor_username:
          type: string
          nullable: true
        actor_role:
          type: string
          nullable: true
        action:
          type: string
          description: |
            Dot-separated verb such as `user.create`, `cluster.update`,
            `auth.login.success`, `auth.login.failure`.
        resource_type:
          type: string
          nullable: true
          description: Kind of the target entity (e.g. `cluster`, `user`, `api_token`).
        resource_id:
          type: string
          nullable: true
          description: Stringified id of the target — may not be a UUID for all kinds.
        http_method:
          type: string
        http_path:
          type: string
        http_status:
          type: integer
        source_ip:
          type: string
          nullable: true
        user_agent:
          type: string
          nullable: true
        details:
          type: object
          additionalProperties: true
          nullable: true
          description: Action-specific payload. Always an object when present.

    AuditEventList:
      description: Paged list of audit events, newest first.
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/AuditEvent'
        next_cursor:
          type: string
          nullable: true
