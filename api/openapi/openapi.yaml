openapi: 3.1.0

info:
  title: Argos CMDB API
  version: 0.1.0
  summary: Kubernetes-centric CMDB aligned with the ANSSI SecNumCloud framework.
  description: |
    REST API for **Argos**, a CMDB for Kubernetes environments aligned with the
    ANSSI SecNumCloud (SNC) qualification framework.

    This version (0.1.0) is a walking skeleton covering:
      - Liveness and readiness probes
      - `Cluster` resource CRUD

    Subsequent versions will add Node, Namespace, Workload, Pod, and other
    Kubernetes entity kinds mapped onto the ANSSI cartography layers.

    Errors follow RFC 7807 (`application/problem+json`).

servers:
  - url: http://localhost:8080
    description: Local development

tags:
  - name: health
    description: Liveness and readiness probes (unauthenticated).
  - name: clusters
    description: Kubernetes clusters registered in the CMDB.
  - name: nodes
    description: Kubernetes nodes (worker / control-plane machines) within a cluster.
  - name: namespaces
    description: Kubernetes namespaces within a cluster.
  - name: pods
    description: Kubernetes pods — the atomic applicative workload units.
  - name: workloads
    description: |
      Kubernetes workload controllers (Deployment, StatefulSet, DaemonSet).
      A single collection polymorphic on the `kind` discriminator; see ADR-0003.
  - name: services
    description: Kubernetes Services within a namespace.
  - name: ingresses
    description: |
      Kubernetes Ingresses. Classified in the `applicative` layer per ADR-0004;
      the "what's internet-exposed?" audit question is answered via future
      ecosystem-layer relationships, not via layer membership.
  - name: persistentvolumes
    description: |
      Cluster-scoped PersistentVolume resources — one row per chunk of backing
      storage the cluster can hand out. Layer `infrastructure_physical` (same
      as Node): the PV maps onto physical disk / CSI volume state.
  - name: persistentvolumeclaims
    description: |
      Namespace-scoped PersistentVolumeClaim resources — the workload-side
      request for storage, bound to a PersistentVolume once the storage class
      provisioner has satisfied it. Layer `applicative`.

security:
  - BearerAuth: []

paths:

  /healthz:
    get:
      tags: [health]
      summary: Liveness probe
      operationId: getHealthz
      security: []
      responses:
        '200':
          description: Service is alive.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Health'

  /readyz:
    get:
      tags: [health]
      summary: Readiness probe
      description: Verifies downstream dependencies (database) are reachable.
      operationId: getReadyz
      security: []
      responses:
        '200':
          description: Service is ready to serve traffic.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Health'
        '503':
          description: Service is not ready.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'

  /v1/clusters:
    get:
      tags: [clusters]
      summary: List clusters
      operationId: listClusters
      security:
        - BearerAuth: [read]
      parameters:
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Cursor'
      responses:
        '200':
          description: Paged list of clusters.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClusterList'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

    post:
      tags: [clusters]
      summary: Register a cluster
      operationId: createCluster
      security:
        - BearerAuth: [write]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ClusterCreate'
      responses:
        '201':
          description: Cluster created.
          headers:
            Location:
              description: URI of the newly created cluster.
              schema:
                type: string
                format: uri
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Cluster'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          $ref: '#/components/responses/Conflict'

  /v1/clusters/{id}:
    parameters:
      - $ref: '#/components/parameters/ClusterId'
    get:
      tags: [clusters]
      summary: Get a cluster
      operationId: getCluster
      security:
        - BearerAuth: [read]
      responses:
        '200':
          description: Cluster details.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Cluster'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

    patch:
      tags: [clusters]
      summary: Update mutable fields of a cluster
      description: |
        Merge-patch semantics: fields omitted from the body are unchanged.
        `name` is immutable after creation.
      operationId: updateCluster
      security:
        - BearerAuth: [write]
      requestBody:
        required: true
        content:
          application/merge-patch+json:
            schema:
              $ref: '#/components/schemas/ClusterUpdate'
      responses:
        '200':
          description: Updated cluster.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Cluster'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

    delete:
      tags: [clusters]
      summary: Delete a cluster
      operationId: deleteCluster
      security:
        - BearerAuth: [delete]
      responses:
        '204':
          description: Cluster deleted.
        '401':
