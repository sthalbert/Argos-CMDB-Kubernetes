---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: longue-vue
  namespace: longue-vue-system
  labels:
    app.kubernetes.io/name: longue-vue
    app.kubernetes.io/component: collector

---
# ClusterRole granting the bare minimum the collector needs to catalogue the
# cluster: list on the six resource kinds longue-vue currently ingests. No watch,
# no get-by-name, no write of any kind. Matches the cartography principle of
# least privilege — the CMDB is strictly a reader.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: longue-vue-cluster-reader
  labels:
    app.kubernetes.io/name: longue-vue
rules:
  - apiGroups: [""]
    resources: ["nodes", "namespaces", "pods", "services", "persistentvolumes", "persistentvolumeclaims"]
    verbs: ["list"]
  - apiGroups: ["apps"]
    resources: ["deployments", "statefulsets", "daemonsets", "replicasets"]
    verbs: ["list"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["ingresses"]
    verbs: ["list"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: longue-vue-cluster-reader
  labels:
    app.kubernetes.io/name: longue-vue
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: longue-vue-cluster-reader
subjects:
  - kind: ServiceAccount
    name: longue-vue
    namespace: longue-vue-system
