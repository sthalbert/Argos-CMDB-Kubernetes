---
# Copy this file to secret.yaml and fill in real values before applying.
# DO NOT add secret.yaml to version control.
apiVersion: v1
kind: Secret
metadata:
  name: longue-vue-collector-credentials
  namespace: longue-vue-system
  labels:
    app.kubernetes.io/name: longue-vue
    app.kubernetes.io/component: push-collector
type: Opaque
stringData:
  # The longue-vue instance URL the collector pushes to.
  LONGUE_VUE_SERVER_URL: "https://longue-vue.internal:8080"
  # A PAT with write scope, created in the longue-vue admin panel.
  LONGUE_VUE_API_TOKEN: "longue_vue_pat_CHANGEME"
  # Optional: PEM-encoded CA for the longue-vue (or gateway) TLS certificate.
  # LONGUE_VUE_CA_CERT: "/etc/longue-vue/tls/ca.pem"
  # Optional: client cert + key for mTLS to a gateway.
  # LONGUE_VUE_CLIENT_CERT: "/etc/longue-vue/tls/client.crt"
  # LONGUE_VUE_CLIENT_KEY: "/etc/longue-vue/tls/client.key"
  # Optional: extra headers for gateway routing (comma-separated key=value).
  # LONGUE_VUE_EXTRA_HEADERS: "X-Tenant-Id=zad-prod"
