---
# Copy this file to secret.yaml and fill in real values before applying.
# DO NOT add secret.yaml to version control.
apiVersion: v1
kind: Secret
metadata:
  name: argos-collector-credentials
  namespace: argos-system
  labels:
    app.kubernetes.io/name: argos
    app.kubernetes.io/component: push-collector
type: Opaque
stringData:
  # The argosd instance URL the collector pushes to.
  LONGUE_VUE_SERVER_URL: "https://argos.internal:8080"
  # A PAT with write scope, created in the argosd admin panel.
  LONGUE_VUE_API_TOKEN: "argos_pat_CHANGEME"
  # Optional: PEM-encoded CA for the argosd (or gateway) TLS certificate.
  # LONGUE_VUE_CA_CERT: "/etc/argos/tls/ca.pem"
  # Optional: client cert + key for mTLS to a gateway.
  # LONGUE_VUE_CLIENT_CERT: "/etc/argos/tls/client.crt"
  # LONGUE_VUE_CLIENT_KEY: "/etc/argos/tls/client.key"
  # Optional: extra headers for gateway routing (comma-separated key=value).
  # LONGUE_VUE_EXTRA_HEADERS: "X-Tenant-Id=zad-prod"
