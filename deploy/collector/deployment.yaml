---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: longue-vue-collector
  namespace: longue-vue-system
  labels:
    app.kubernetes.io/name: longue-vue
    app.kubernetes.io/component: push-collector
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: longue-vue
      app.kubernetes.io/component: push-collector
  template:
    metadata:
      labels:
        app.kubernetes.io/name: longue-vue
        app.kubernetes.io/component: push-collector
    spec:
      serviceAccountName: longue-vue-collector
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: longue-vue-collector
          image: ghcr.io/sthalbert/longue-vue-collector:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: LONGUE_VUE_CLUSTER_NAME
              value: in-cluster
            # Empty = in-cluster ServiceAccount credentials.
            - name: LONGUE_VUE_KUBECONFIG
              value: ""
            - name: LONGUE_VUE_COLLECTOR_INTERVAL
              value: "5m"
            - name: LONGUE_VUE_COLLECTOR_RECONCILE
              value: "true"
          envFrom:
            - secretRef:
                name: longue-vue-collector-credentials
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
            limits:
              cpu: 250m
              memory: 128Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
