---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: longue-vue-collector
  namespace: longue-vue-system
  labels:
    app.kubernetes.io/name: longue-vue
    app.kubernetes.io/component: collector

---
# Same read-only ClusterRole as the pull collector: list on the resource
# kinds the collector ingests. No watch, no write.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: longue-vue-collector-reader
  labels:
    app.kubernetes.io/name: longue-vue
rules:
  - apiGroups: [""]
    resources: ["nodes", "namespaces", "pods", "services", "persistentvolumes", "persistentvolumeclaims"]
    verbs: ["list"]
  - apiGroups: ["apps"]
    resources: ["deployments", "statefulsets", "daemonsets", "replicasets"]
    verbs: ["list"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["ingresses"]
    verbs: ["list"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: longue-vue-collector-reader
  labels:
    app.kubernetes.io/name: longue-vue
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: longue-vue-collector-reader
subjects:
  - kind: ServiceAccount
    name: longue-vue-collector
    namespace: longue-vue-system
