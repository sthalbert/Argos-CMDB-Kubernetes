# TEMPLATE — never commit real secrets. Copy this file, fill in the values,
# and `kubectl apply -f` it (or use an external-secrets / vault operator in a
# real deployment).
#
# The Secret name ('argos-credentials') is referenced by deployment.yaml via
# envFrom. Add or remove keys here freely — envFrom surfaces every key in
# the Secret as an env var on the container.

apiVersion: v1
kind: Secret
metadata:
  name: argos-credentials
  namespace: argos-system
type: Opaque
stringData:
  # PostgreSQL connection string. Production-grade options include a
  # SecNumCloud-qualified managed Postgres or an in-cluster operator such as
  # CloudNativePG. The argosd user needs read/write + CREATE (for goose
  # migrations) on the argos database.
  ARGOS_DATABASE_URL: "postgres://argos:REPLACE-ME@postgres.default.svc:5432/argos?sslmode=require"

  # Optional: set a predictable initial admin password for the first-run
  # bootstrap (per ADR-0007). If unset, argosd generates a random 16-char
  # password and prints it ONCE to the startup log. Either way, the admin
  # is forced to rotate on first login (must_change_password=true).
  #
  # Safe to leave set across restarts: only consulted when no admin
  # user exists yet.
  # ARGOS_BOOTSTRAP_ADMIN_PASSWORD: "REPLACE-ME-with-a-long-passphrase"

  # Session cookie `Secure` flag: auto (default) mirrors the request
  # scheme, always / never override either way. Behind TLS in production.
  # ARGOS_SESSION_SECURE_COOKIE: "auto"

  # --- Optional: OIDC federation (ADR-0007) -----------------------------
  # Set ARGOS_OIDC_ISSUER to enable the "Sign in with <IdP>" flow. The
  # issuer URL must serve the OpenID discovery document at
  # `<issuer>/.well-known/openid-configuration`; argosd fetches it once
  # at startup and fails fast on errors (misconfig is operator-visible).
  # The redirect URL must match what's registered at the IdP and point
  # to the argosd instance users actually hit (TLS terminator).
  # ARGOS_OIDC_ISSUER: "https://accounts.example.com"
  # ARGOS_OIDC_CLIENT_ID: "argos"
  # ARGOS_OIDC_CLIENT_SECRET: "REPLACE-ME"
  # ARGOS_OIDC_REDIRECT_URL: "https://argos.example.com/v1/auth/oidc/callback"
  # ARGOS_OIDC_SCOPES: "openid,email,profile"   # default
  # ARGOS_OIDC_LABEL: "Corp SSO"                # button text, default "OIDC"
