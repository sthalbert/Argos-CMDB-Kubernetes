apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Deploy the VM collector for one Outscale (or other supported cloud)
# account (ADR-0015). One Deployment per cloud account.
#
# Prerequisites:
#   1. argosd is reachable and has LONGUE_VUE_SECRETS_MASTER_KEY configured.
#   2. An admin pre-registers the cloud_account in the argosd UI
#      (Admin > Cloud Accounts > Add account) — name + region; AK/SK
#      can be filled in now or after the collector starts.
#   3. The admin issues a vm-collector PAT bound to that account from
#      the same UI screen — the plaintext is shown once.
#
# Usage:
#   1. Copy secret.example.yaml -> secret.yaml, paste the PAT into it.
#   2. Edit configmap.yaml — set LONGUE_VUE_SERVER_URL, LONGUE_VUE_VM_COLLECTOR_ACCOUNT_NAME,
#      LONGUE_VUE_VM_COLLECTOR_REGION.
#   3. kubectl apply -f deploy/vm-collector/secret.yaml
#   4. kubectl apply -k deploy/vm-collector/

resources:
  - configmap.yaml
  - deployment.yaml
  - networkpolicy.yaml
