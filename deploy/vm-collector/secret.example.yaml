# Copy this file to secret.yaml and fill in the PAT issued from the
# argosd admin UI (Admin > Cloud Accounts > [account] > Issue collector token).
#
# The token is shown exactly once at creation time. Save it here, apply the
# Secret, then deploy via `kubectl apply -k deploy/vm-collector/`.
#
# DO NOT commit secret.yaml — only secret.example.yaml is in source control.
apiVersion: v1
kind: Secret
metadata:
  name: argos-vm-collector-credentials
  namespace: argos-system
  labels:
    app.kubernetes.io/name: argos
    app.kubernetes.io/component: vm-collector
type: Opaque
stringData:
  LONGUE_VUE_API_TOKEN: "argos_pat_REPLACE_ME_REPLACE_ME_REPLACE_ME_REPLACE_ME"
