apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: longue-vue-vm-collector
  namespace: longue-vue-system
  labels:
    app.kubernetes.io/name: longue-vue
    app.kubernetes.io/component: vm-collector
# Egress allowlist for the vm-collector pod. Only:
#   - argosd (in-cluster Service or external endpoint via gateway)
#   - the cloud-provider public API (Outscale: api.{region}.outscale.com on TCP 443)
#   - in-cluster DNS for service discovery
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: longue-vue
      app.kubernetes.io/component: vm-collector
  policyTypes:
    - Egress
  egress:
    # In-cluster DNS.
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # argosd in-cluster service (adjust selector if your argosd lives elsewhere).
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: longue-vue
              app.kubernetes.io/component: daemon
      ports:
        - protocol: TCP
          port: 8080
    # Cloud-provider API. NetworkPolicy can't restrict by FQDN — the rule
    # below allows TCP 443 to any external destination. Tighten with a
    # service mesh / Cilium FQDN policy for stricter egress.
    - ports:
        - protocol: TCP
          port: 443
