apiVersion: v1
kind: ConfigMap
metadata:
  name: longue-vue-vm-collector-config
  namespace: longue-vue-system
  labels:
    app.kubernetes.io/name: longue-vue
    app.kubernetes.io/component: vm-collector
data:
  # The argosd endpoint the collector pushes to. Behind a gateway:
  # set the gateway URL with optional path prefix (LONGUE_VUE_SERVER_URL is
  # used as the base for every request).
  LONGUE_VUE_SERVER_URL: "http://longue-vue.longue-vue-system.svc.cluster.local:8080"

  # The cloud_account this collector is bound to. Must match the name
  # used when issuing the vm-collector PAT.
  LONGUE_VUE_VM_COLLECTOR_PROVIDER: "outscale"
  LONGUE_VUE_VM_COLLECTOR_ACCOUNT_NAME: "outscale-vm-collector"
  LONGUE_VUE_VM_COLLECTOR_REGION: "eu-west-2"

  # Tick cadence and timeouts.
  LONGUE_VUE_VM_COLLECTOR_INTERVAL: "5m"
  LONGUE_VUE_VM_COLLECTOR_FETCH_TIMEOUT: "30s"
  LONGUE_VUE_VM_COLLECTOR_RECONCILE: "true"

  # How often to refetch credentials from argosd. Lets admin AK/SK
  # rotation propagate without a redeploy.
  LONGUE_VUE_VM_COLLECTOR_CREDENTIAL_REFRESH: "1h"

  # Metrics listener bound to all pod interfaces — the pod IP is the
  # network boundary in Kubernetes, and the deployment's livenessProbe
  # tcpSocket:9090 needs to reach this from outside the container.
  # No Service exposes this port externally. Empty string = disabled.
  LONGUE_VUE_VM_COLLECTOR_METRICS_ADDR: "0.0.0.0:9090"
